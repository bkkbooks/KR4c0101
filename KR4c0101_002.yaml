front:
  text: 唐祕書省正字先輩徐公釣磯文集卷第二
  hash: sha256:4d78795fcb846382ce0189d109d52172fd4b55f34e5ac2e0b2cfe689cd0f9562
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_002-1a}
body:
  text: 徐夤昭夢著賦朱虛侯唱田歌賦國不危無以見英智智不周何以殄姦詭當漢室之架亂有劉章之崛起於是謳甫田拍清徴當其吕氏窺鼎劉宗履氷社稷騫崩邦家替凌咸云吕氏必興劉氏不勝雖諸將之賈勇終按劔以未能鯨躍海以須斬狐居城以暫驚旋聞玉殿窮歡瓊筵命酒貂璫皆戚里豪貴冠蓋盡台階賔友賢愚但委其天命綱紀定輸於誰手章欲刮其瑕滌其垢摧其凶破其醜掌握於龍圗鳳曆已斷前言縱橫其地軸天樞猶歸太后朱虛乃誓遏頽波平妖剗訛得則赫功名於日月失則化虀粉於干戈在其誠而不在其衆言於我而不計於他於時玉爵驟朱顔酡直氣仰按昌言切磋曾專執采之功多能鄙事粗習貫珠之韻請唱田歌歌曰舜之耕兮稷之植廓民天而知稼穡踈其苗而固其帶法於家而象於國又曰沮之耕兮溺之耘灌粢盛兮除苾芬抉蟊賊兮多稼稔剪榛蕪兮嘉榖分取厥類兮去非類諭於臣而象於君想其傾海未竭轉喉未闋衆愈恰而詭譎我憤惋而剛烈怒聲徹天地託雅調以成聲熱氣煎肺肝瞬明眸而漬血且以酒不罰無以肅否臧令不正無以决存亡宣酒令而為君令假樂章而行國章犯令者誇爾言而鬼爾族亡酒者肉爾膾而血爾漿我唱也不在深耕淺種我志也克在乎帝業皇綱俄而烹一吕禁陸梁侍坐者汗滴膽碎傍觀者心顛魄狂吕之強倐爾而弱劉之弱歘爾而強不自計之取兵之舉帝諸劉虜諸吕有若乎摧枯拉朽反似乎平秦破楚故得告功於聖祖削平乎強禦則知伏於誠者須籍於英傑切於已者莫先乎子孫安子孫而總英傑故能復宗社而正乾坤向若口不能唱唱不能言則國豈定而家豈存者也余欲編田歌於樂府上聞於至尊外舉不避讐賦君子之用心也不以親為親不以讐為讐惟賢是搜惟德是求舉於上也可以治國匡主疏於爵也可使公主為侯不可嫉其賢而失公論庇其善而顯私仇昔者哀公問儒宣尼對曰斯言爭奧於鬼神厥理俱懸於日月國家或利於親於怨以相推金玉非珍惟信惟忠而罔闕且君之所任任者在乎哲人人難自舉自舉者在乎忠臣臣又狥私則君失任君失任則賢曷親如此則壞洪業而隳大倫者也凡百事君冝其去已勿以己怒而要衆怒勿以己喜而招衆喜至如已喜者非賢固難續鳬脛而長焉已怒者誠善固難掩驪頷於暗然病一身而利四海已於後而物於先豈可哀者不歌惡鏗鏘於雅樂行人怨雨怪雱霈於甫田又若建宫室架梁棟在乎繩墨克正而斧斤克中是冝採匠石之明言不可憾般倕而不用無偏無黨祈奚不廢於周狐拾短求長齊主寧猜乎管仲又若秀發閨閫才惟子孫又安得池有龍兮惟蟠惟蟄巢有鳳而不飛不翻抱其器以須用雖其親而必言親既不憚讐何足論蓋將抱君寵酬君恩如是則慶積髙門垂裕後昆亘此道而天地永播斯聲而寰宇宣况有其行者皆闡無其瑕者盡見我縱掩而人詎掩我不薦而人必薦豈若擢英賢於下位贊明君於南面外無怨而內無親所舉者皆邦華國彥避世金馬門賦名利交奔大隱之人兮心還混元晦其迹而寧歸碧洞避其時而却入金門亦何必野岸垂釣荒村灌園目其利而我性非利耳其喧而吾心不喧曼倩以骨本天仙才唯墨客佩紫禁之圭組别丹丘之窟宅三冬積學明君之玉棗先知千載為期阿母之仙桃幾摘口誦詩書身遊紫微滑稽而黃屋頻諌鴛鴦而青雲共飛雨露恩深列朝廷之百辟風塵不到隔天子之雙扉不知我為我沽寵榮知我者謂我逃薄祿吏􅃮園而無得無喪官柱史兮何榮何辱豈異嚴霜降處難傷夫翠竹青松烈火焚時不損其良金璞玉不在乎巖谷終身揖飛泉而眠白雲昧其道則身山林而心垢氛曷若干大國而謁明君顯其道則心無瑕而身榮動衆炫耀兮我不見衆喧譁而我不聞觀啓石渠豈異清溪之景宫開白虎寧思玄豹之群且避世者在乎逺其禍棲蹤者在乎求其道殊不知道也者不在乎人而在乎我禍也者在乎貪其財而瀆其貨我今以珠玉而為瓦礫以希微而通壽考簪裾照耀誰思箕嶺一瓢閶闔優游堪笑商山四皓一旦武帝求玄靈姝降天指出三清之侣言非下界之賢自兹玉石分矣公卿諤然五利文成謾說三山之藥金匱鎖闥常居六洞之仙豈不以華夏無虞君臣胥樂負其才而皆取名位背其理而乃居林壑臣今歌紫宸誦黃閣庶金門之馬有託東陵侯弔蕭何賦弔衰哀戚兮世之常情弔豪貴者人難敢行有秦朝之俊乂憂漢室之公卿莫不指先兆談未萌人生之倚伏難逃如形如影天道之盈虛有數暮落朝榮當其秦楚兵銷君臣義閉江南誅布之後代北平陳之際彭越先斬淮隂以繼周勃之兵機第一縲紲常拘鄼侯之相業無雙豼貅再衛且侯也道赫巖廊權傾紀綱才吞伊吕道亞皇王欲怒而蚪龍伏慝流恩而瓦礫輝光人民顧我以無先何憂何懼邦家因吾而肇造為棟為梁邵平則近甸隱淪前朝侯伯叔孫去國而制禮綺季因時而遁匿於是入青門尋紫陌波瀾濟陸海之岸劔㦸列三台之宅朱門赫奕𥘉驚草澤之人黃閣巍峩乍揖瓜田之客客曰公無冒寵承恩慿髙恃尊家不善而殃至神害盈而禍翻木必摧秀葵須衛根賦命而吉凶同域由人而禍福無門當時豐沛之間差肩並起今日干戈之後屈指誰存鷙䠞履氷燕巢懸幕兔殘而獵犬誰惜敵盡而謀臣曷作伍子不省尸漂於叠浪驚濤范蠡能辭身隔乎重湖逺壑今則瑰寶酬恩兵戈衛君以架欺危於纍卵堪驚冨貴於浮雲侯曰事既將悟計乎已聞客來悽愴而諭嗚呼以云良田廣宅擬可用積玉堆金奚不分漏盡光催魑魅而看將笑聚妖生孽作妻孥而豈得同群侯乃狥彼英詞師其上德能全終始於當代果釋猜嫌於大國良哉避陳主而弔漢侯果見東陵而鍳識貴以賤為本賦貴不可偶貴故託賤以為本賤不可久賤故從貴而顯諸因考貴以由賤乃明終而有𥘉則知失其本而事不立得其本而義有餘吾嘗詢道德之至理知貴賤之終始當俟其為龍為光必先乎藏垢懷恥徴乎諭也義同乎髙以下為基驗以誠焉理協乎洪由纎而起今請疏當時貴賤書往代君臣漢得鹿兮始諸亭長周興龍兮自彼戎人殛鯀帝王雷澤與歷山舊隱擲盧天子耕衣將農器嘗陳此君上之貴也賤為本以相因嫓用晦而以明此澄髙而自下太公相國昔垂釣曲逆封侯曾宰社雞鳴末客終為輔主之人燕頷將軍亦是鬻書之此臣下之貴焉賤為本以相假人既有矣物以冝焉則有寶衒明月珠含媚川價重千金乃蚌胎而産矣光照午夜亦蛇口而生焉彼珠璣之貴也賤為本以相㳂在乎潔於道不在穢乎跡復有稱連城而趙國瑰璜號垂棘而晋宫輝赫崑嶽混潤之片不亦沉泥荆山硌碌之英乃聞韞石此瓊玉之貴焉賤為本以相易得不以其賤而為根為蒂以其貴而為華為英有根有蒂而英華始茂亡根亡蒂而英華曷榮亦曰天道無形宗淡泊而成道政聲無朕扣寂寞而致聲愚今察聖人之理探老氏之言斯見窮其微而知其要頥其隱而從其善所以明冨貴之本焉又安得久處於貧賤義漿得玉賦義漿殊賤玉惟至珍有楊玄之立德果隂隙以酬仁豈非惻隱天資不為恩而恩自感明誠日皎不望報而報自臻所以悲其逺道長征窮途未達或朔風而千里遐阻爍火景而四郊空濶堪嗟其自北自南每想其再飢再渴一瓢白水能頒岐路之人數仭朱門誰顧風塵之末於是博施無偏壺漿湛然清若玄酒甘如醴泉既日日以又日復年年而一年汪以何窮問東流於巨海浸而無怠瞻北斗於遼天莫不椒桂飄香雲霞艷色行人欣塞路之美戰士豁鹽梅之惑無冬無夏不酌水以酌心暮往朝來非飲漿而飲德寒暑相移精神罔虧人不報而神代報世未知而天己知俄而垂感應降瑰兮被褐懷來五侯之家獲寶盈疇種罷連城之價驚時倐作瑶璋俄同圭錫凝雪彩於三徑貫虹光於四壁則知矯其施者恩絶竊其珍者禍積嗟來與食寧招蒙袂之人再獻為心謾剖輝山之石且夫濟人渴者尚報非虛薦人善者厥報何如渴之濟兮小恩小惠善之報兮開慘開舒可以慶其國髙彼門閭克商於簪纓爵祿豈惟瓊玖璠璵事在何人道歸君子隂其德而德於心陽其報而報於已昭然貽厥於孫謀不並義漿之理管仲棄酒賦酒不可嗜嗜之者必致危顛酒可以誡誡之者其惟智賢嘉管仲後醒之說當齊侯門宴之年九醒雖珍盡棄丹墀之上一言可聽將陳綺席之前當其邦國誰憂樽罍不淺將傾海以為飲孰懸河而進辨列坐而腰金拖紫寧問安危終朝而舉日飛觴唯求沉湎仲乃拜捧瑶巵傾言吐斯縱竹葉以非貴任蘭英而罔竒不咽涓滴如無禮儀左右相驚幾謂其棄王以罪公侯莫測應云其不死胡為君子爰詢大夫遂說臣非怠於恭敬臣非輕於麯糵蓋將入口以言失或者言失而身滅再思敢棄於君所三省得中於臣節臣聞酒禍難防臣何以當羲和惑以身喪桀紂耽而國亡臣今棄其禍而不棄於酒臣願醉於道而不醉於觴何不規後世鑒前王太康酣而昆仲悲怨大禹惡而邦家耿光夫如是又何必欣腐脅而候穿腸者哉公乃擢彼昌言師諸碩德穰苴未可以倫比寧戚誠冝於緘默衆人黽勉應慙皆醉之容惟我端莊益勵獨醒之厄則知立誠者莫溺㫖酒輔主者須申讜言酒不溺則樞機自正言苟申則忠信常存大計安邦致一匡而永逸殊勳佐國君五霸以彌尊則管氏也可與周召同風䕫龍並位能棄酒以無諂表為臣之不二昭昭青史見清英克播於千齡萬祀扣寂寞以求其音賦寂寞何有聲音內并不扣而基扄自啓能求而律吕方呈馳神於不宰之鄉籠將造化運思於無形之景剖出清凉豈不以大道將祕正聲無自走六合以何有歷千門而曷致縱得伶倫之管吟亦徒為便多子冶之聽聰將不至我則開寂寂戞戞向無象以取象無音而索音莫不塞耳目廓胸襟靡在踈而在靜不由物以由心透恍惚以斯採觸杳冥而獨尋擊楊雄吐鳳之門應憐鳳嘯排老氏猶龍之闥別契龍吟是音也非桑濮之傳者異秦齊之奏也得之則協人神暢風雅本冲漠而將有豈喧譁而與假考靈臺而入聽我調斯鳴循樂府以來追我音則啞就默祈喧稀其大焉下不在乎地髙不在乎天逺不在乎物外近不在乎目前以諷諭君德經綸化權以約黃鐘而定律如依赤水而探玄亦由字本無文究蟲篆而斯文遂顯木元無火鑽槐樹而厥火俄然在乎拆彼誠明分諸兆朕拂希夷而瀏亮濳引刳淺薄而滄洋自振豈比夫宣尼宅在依稀留金石之聲秦女臺空倣佛有鸞凰之韻寂與寞兮虛更幽聲與音兮深且柔未嘗扣之將扣在勤求之所求豈不以役智而偶凝神以搜雖蒼蒼之道將授亦軋軋之聲若抽如緑綺之空濶彈來始應若清泉之阻塞决破方流儒首貴陸氏之賦成與昭明之道合欲三變之清異陋衆音之錯雜每慙文藻比芻蕘願侯王之海納知白守黑為天下式賦白為象兮皎焉明焉黑為象兮暗然昧然踞其明而為事之賦混其昧而為道之筌白以將行恐率土之惡盈患作黑之為式庶普天之用晦功全昔聖人以抱玄默取道德既溢目以知白復亡形而守黑黑雖朽而守緇白將變而易色和其光也為萬有之憲章同以塵焉作群生之楷式愚嘗出知白之藩入守黑之門就其曜而不曜居其昏而不昏白易玷而式易立黑無文而式可存豈不見卞和獻荆岫之珍先傷足脛大禹治北方之水後化乾坤至如佩寵光綏景福殊不知寵之極兮辱之繼福之多兮禍之速天時尚有其盈虛人事須防其反覆神龍龜聖嘗聞其醢肉刳腸象齒蠙珠但見其焚軀剖腹此白也可知庶思之而自勗則知弱可吞強柔能制剛土之弱兮能廣載水之柔兮流且長得不暗室自處明誠自彰所以耕稼歷山果見重華之帝羈纍羑里終歸西伯之王斯黑兮可守庶存之而不忘其為知兮不在乎外其為守兮不在乎內協上德之不德諒靡明而靡昧如此則外减浮榮中含利貞功其成而不宰致其勝而不爭縱泥滓之埋光瓊瑶愈潔任烟霞之蔽影日月終明老氏所以著此垂言流而設教帝王法之而自英自聖臣子體之而乃忠乃孝余將優游於玄牝之鄉每勤行而是效澗底松賦碧澗千仭青松幾年豈天生之有異蓋地勢以居偏挺操彌貞雖厄巖巒之下掄材倘鍳合居樗櫟之前則知植物之近不可用而或用生物之逺其可貢而誰貢伊彼良木限乎深洞俟時幾慮其樵採抱直屢思其梁棟神如我化何慙其青竹成龍工未我永且伴其髙梧宿鳳翠鎖山椒心凌碧霄生風而虎豹吟嘯拂水而龍蛇動搖安得伴磊磊之石因離離者苗奚三公之夢猶阻豈萬乘之封尚遙何殊孔明之先主未迎空懷良策吕望之文王非獵不到終朝今則希匠斤採溪壑如拔之於髙岸邃谷可營之於帝宫仙閣澗底松兮才不才侯般輸之所度釣磯文集卷第二
