front:
  text: 唐祕書省正字先輩徐公釣磯文集卷第九
  hash: sha256:bdde302a841e4a3e76a5816fac74f169aa3334a5486f64822f2e4a005ccd7c8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_009-1a}
body:
  text: 徐夤昭夢著詩七言律詩五十二首偶吟贈表弟黃校書輅産破身窮為學儒我家諸表愛詩書嚴陵雖説臨溪隱晏子還聞近市居佳句麗偷紅􅔽蓞吟窗冷落白蟾蜍間來共話無生理今古悠悠事總虛輦下贈屯田何員外封章頻得帝咨嗟報國惟將直破邪身到西山書幾達官登南省鬢𥘉華厨非寒食還無火菊待重陽擬泛茶內翰好才兼好古秋來應數到君家員外與楊老丞翰林同年恩義最深贈月君山妻字月君伏見文選中顧彥光亦有贈婦因杼此詠出水蓮花比性靈三生塵夢一時醒神傳尊勝陀羅咒佛授金剛般若經懿德好書添女誡素容堪畫上銀屏鳴梭軋軋纎纎手窗户光流織女星贈垂光同年丹桂攀來十七春如今始見茜袍新須知紅杏園中客終作金鑾殿裏臣逸少家風惟筆札玄成世業是陶鈞他是黃閣朝元處莫忘同年射策人贈楊著作藻麗熒煌士林白華榮養有曽參十年去里君門故八歲能詩相座吟李廣不侯身漸老子山操賦恨何深釣魚臺上頻相訪共説長安淚滿襟贈黃校書先輩璞間居取得驪龍第四珠退依僧寺卜貧居青山入眼不干祿白髮滿頭猶著書東澗野香添碧沼南園夜雨長秋𬞞月明掃石吟詩坐諱却全無儋石儲尚書榮拜恩命夤疾中輟課惡詩二首以申攀讃明公家鑿鳯凰池弱冠封侯四海推冨貴有期天授早關河多難敕來遲昴星人傑當王佐黃石仙翁識帝師昨日詔書猶漏缺未言商也最能詩又東郊迎入紫泥封此日天仙下九重三五月明闞澤百千人衆看王恭旗傍緑樹遙分影馬踏浮雲不見蹤借問乘軺何處客相庭雄幕卷芙蓉府主僕射王搏生日光化三年己未八月獻熊羆先兆慶垂休天地氤氲瑞氣浮李樹影籠周柱史昴星光照漢鄪侯數鍾龜鶴千年算律正乾坤八月秋勳業定應歸鼎鼐生靈豈獨化東甌獻內翰楊侍郎窗開青瑣見瑶臺冷拂星辰逼上台丹鳯詔成中使取白龍香近聖君來欲言溫署三緘口間賦宫詞八斗才莫擬吟雲避榮貴廟堂玉鉉待鹽梅送劉常侍惜君何計更留連忍送文星上碧天杜預注通三十卷漢皇枝紹幾千年言端信義如明月筆下篇章似湧泉也日有書隨雁足東溪無吝訪漁船送盧拾遺歸華山紫殿諫多防佞口清秋假滿别明君惟憂急詔歸青瑣不得經時卧白雲千載茯苓携鶴斸一峯仙掌與僧分門前舊客期相薦猶望飛書主文春末送陳先輩之清源貧中惟是長年涯每羡君行自嘆嗟歸日捧持明月寶去時期刻刺桐花春風避酒多遊寺曉騎聽雞早入衙千乘侯王若相問飛書與報白雲家上盧三拾遺以言見黜骨鯁如君道尚存近來人事不須論疾危必厭神明藥心惑多嫌正直言冷眼靜看真好笑傾懷與説却為冤因思周廟當時誡金口三緘示後昆送王校書往清源南國賢侯待德風長途仍借九花驄清歌早貫􅌐龍頷丹桂曾攀玉兔宫楊栁堤邊梅雨熱鷓鴣聲裏麥田空吟詩臺上如相問與説磻溪直釣翁嶽州端午日送人遊郴連五月巴陵值積隂送君千里客於郴北風吹雨黃梅落西日過湖青草深競渡岸傍人挂錦採羮城上女遺簮九嶷雲濶蒼梧暗與説重華舊德音賀清源太保王延郴二首蕊珠宫裏謫神仙八載溫陵萬户間心地濶於雲夢澤官資髙却太行山薑牙兆寄熊羆內陶侃文成掌握間應笑清溪舊門吏年年扶病掩柴關又武榮江畔蔭祥雲寵拜天人慶郡人五色鶴綾花上敕九霄龍尾道邊臣英雄達處誰言命冨貴來時自逼身更待春風飛吉語紫泥分付與陶鈞病中春日即事寄主人尚書二首身比秋荷覺漸枯致君經國墮前圖層氷照日猶能暖病骨逄春却未蘇鏡裏白鬚撏又長枝頭黃鳥靜還呼庾樓恩化通神聖何計教招擲得盧又風拍衰肌久未蠲破窗頻見月團圓更無舊日同人問只有多情太守憐臘內送將三折股歲隂分與五銖錢玄穹若假年齡在願捧銅盤為國賢寄華山司空侍郎三首金闕爭權競獻功獨逃徴詔卧三峯雞群未必容於鶴蛛網何由捕得龍清論盡應書國史靜籌皆可息邊烽風霜落滿千林木不近青青澗底松又非雲非鶴不從容誰敢輕量傲世蹤紫殿幾徴王佐業青山未拆詔書封間吟每待秋空月早起長先野寺鐘前古負才多為國滿懷經濟欲何從又仙掌林中第一人鶴書時或問眠雲莫言踈野全無事明月清風肯放君寄盧端公同年仁炯時遷都洛陽新立幼主上陽宫闕翠華歸百辟傷心序漢儀崑嶽有炎瓊玉碎洛川無竹鳯凰飢須簮白筆匡明主莫許黃瓢博少師惆悵宸居逺於日長吁空摘鬢邊絲寄天台陳希畋隂山氷凍嘗迎夏蟄户雲雷只待春吕望豈嫌垂釣老西施不恨浣紗貧坐為羽獵車中相飛作君王掌上身拍手相思惟大笑我曹寧比等間人寄兩浙羅書記進即堙沉退却升錢塘風月過金陵鴻才入貢無人喚白首從軍有詔徴博簿集成時輩罵讒書編就薄徒憎憐君道在名長在不到慈恩最上層邑宰相訪翼日有寄淵明深念郤詵貧踏破莓苔看甑塵碧沼共攀紅􅔽蓞金鞍不缷紫麒麟殘陽妬害催歸客薄酒甘嘗罰主人夜半夢醒追復想欲長攀接有何因白酒兩瓶送崔侍御雪化霜融好潑醅滿壺氷凍向春開求從白石洞中得擕向百花巖畔來幾夕露珠寒貝齒一泓銀水冷瓊杯湖邉送與崔夫子誰見稽山盡日頺依韻酬常循州早年花縣拜潘郎尋忝飛鳴出桂堂日走登天長似箭人同紅樹豈經霜帆分南浦知離别駕在東州更可傷公論一麾將塞詔且隨徴令過瀟湘謝主人惠緑酒白魚早起鵲聲送喜頻白魚芳酒寄來珍馨香乍揭春風甕撥刺𥘉辭夜雨津樽濶最冝澄桂液網踈殊未損霜鱗不曽垂釣兼親醖堪愧金臺醉飽身蜀雖倚關張敵萬夫豈勝恩信作良圖能均漢祚三分業不負荆州六尺孤緑水有魚賢已得青桑如蓋瑞光等君王幸是中山後建國如何號蜀都魏伐罪書勳令不常爭教為帝與為王十年小怨誅桓邵一檄深讐怨孔璋在井蟄龍如屈伏食糟驕馬忽騰驤姦雄事過分明見英識空懷許子將吳一主參差六十年父兄猶慶授孫權不迎曹操真長策終謝張昭見碩賢建業龍盤雖可貴武昌魚味亦何偏秦嬴謾作東遊計紫氣黃旗豈偶然兩晉三世深謀啓帝基可憐孀婦與孤兒罪歸成濟皇天恨戈犯明君萬古悲巴蜀削平輕似紙勾吳吞却美於多髙鼻能知數競向中原簸戰旗宋二首天爵將儋石論一身恭儉萬邦尊賭將金帶驚寰海留得耕衣誡子孫締搆不應饒漢祖姦雄何足數王敦草中求活非吾事豈啻橫身向廟門又百萬人甘一擲輸玄穹惟與道相符豈知紫殿新天子只是丹徒舊嗇夫五色龍章身早見六終鴻業數難逾三年未得分明夢却為蘭陵啓霸圖陳三惑昏昏中紫宸萬機拋却醉臨春書中不禮隋文帝井底尚擕張貴嬪玉樹歌聲移入金陵天子化為臣兵戈半渡前江水狎客猶聞爭酒巡讀史亞父凄涼别楚營天留三傑翼龍爭髙才無主不能用直道有時方始平喜愠子文何頴悟卷藏蘧瑗甚分明須知飲啄由天命休問黃河早晚清漢宫新寵位在嬪妃最上頭笑他長信女悲秋日中月滿可能久花落色衰殊未憂公主鏡中爭翠羽君王袖底奪金鈎妾家兄弟知多少恰要同時拜列侯開元即事曲江真宰國忠訛尋奏漁陽忽荷戈堂上有兵天不用幄中無策印空多楊國忠時兼諸使館三十二印塵驚騎透潼關鎖雲送龍遊錦水波未必蛾眉能破國千秋休恨馬嵬坡李翰林謫下三清列八仙獲調羔鼎侍龍顔吟開瑣闥窺天近醉卧金鑾待詔間舊隱不歸劉備國旅魂長寄謝公山遺編往簡應飛去散入祥雲瑞日間聞長安庚子歲事羽檄交馳觸冕旒函關飛入兜鍪皇王去國未為恨寰海失君方是憂五色火雲凝蜀郡幾般妖氣撲神州唐堯縱禪乾坤位不是重華莫謾求公子行十五轅門學控弦六街騎馬去如煙金多倍著牡丹價髮白未知章甫賢有耳不聞經國事拜官方買謝恩箋相如謾説凌雲賦四壁何曽有一錢依韻贈嚴司直曾轉霜蓬到玉京宣尼恩奏樂卿名歌殘白石扣牛角賦換黃金愛馬卿滄海二隅身漸老太行千疊路難行夫君才大官何小堪恨人間事不平傷前翰林楊左丞飛上鰲頭侍玉皇三台遺耀換餘光人間搦管窮蒼頡地上修文待卜商貞魄肯隨金石化真風留伴蕙蘭香皇天未啓升平運不使伊臯相禹湯日月無情日月無情也有情朝升夕沒照均平雖催前代英雄死還促後來賢聖生三尺靈烏金借耀一輪飛鏡水饒清慿誰築斷東溟路龍影蟾光免運行新月雲際嬋娟出又藏美人腸斷拜金方姮娥一隻眉先掃織女三分鏡未光珠箔寄鈎懸杳靄白龍遺爪印穹蒼更聞十五圓明夜與破隂霾照八荒和尚書詠煙無根無蒂結還融曾觸嵐光徹底空不散幾知離畢雨欲飛須待落花風玲瓏薄展蛟綃片羃歷輕含鳯竹叢瓊什捧來思舊隱撲窗穿户曉溟𪷟宫鶯領得春光在帝家早從深谷出煙霞間棲仙禁日邊栁飢啄御園天上花睍睆只冝陪閣鳯間關多是問宫娃可憐鸚鵡矜言語長閉雕籠歲月賖雙鷺雙鷺雕籠昨夜開月明飛出立庭隈但教緑水池塘在自有碧天鴻雁來清韻叶霜歸島樹素翎遺雪落漁臺何人為我追尋得重勸溪翁酒一杯鷓鴣繡僕梅兼羽翼全楚雞非瑞莫爭先啼歸明月落邊樹飛入百花深處煙避燒幾曽移逺岫引雛時見飲晴川荔枝𥘉熟無人際啄破紅苞墜野田釣磯文集卷第九
