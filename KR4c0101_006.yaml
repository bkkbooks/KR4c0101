front:
  text: 唐祕書省正字先輩徐公釣磯文集卷第六
  hash: sha256:4386808a5a519c4a4ceacba5b9b639619f7d68a676176a1fee259e1048ec2c0a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_006-1a}
body:
  text: 徐夤昭夢著詩長律八首依御史溫飛卿華清宫二十二韻地靈蒸水暖天氣待宸遊嶽拱蓮花秀峯髙玉蘂秋朝元雕翠閣乞巧繡瓊樓碧海供驪嶺黃金絡馬頭五王更入帳七貴迭封侯夕雨鳴鴛瓦朝陽曄柘裘伊臯爭負鼎舜禹讓垂旒墮珥間應拾遺叉醉不收飛煙籠劒戟殘月照旌斿履朔求衣早臨陽解珮羞宫詞裁錦段御筆落銀鈎帝里新豐縣長安舊雍州雪衣傳貝葉蟬鬢插山榴對景瞻瑶兔升天駕綵虬此言遊月宫後祿山書陳北虜玄甲擐犀牛聖誥多屯否生靈少怨尤穹旻當有輔幃幄豈無籌鳯態傷紅艷鸞輿暖紫騮樹名端正在人欲夢魂休讖悟山旁鬼塵銷隴畔丘重來芳草恨往事落花愁五十年鴻業東慿渭水流尚書命題瓦硯逺向端溪得皆因郢匠成鑿山青靄斷琢石紫花輕散墨松香起濡毫藻自清入臺知價重著匣恐塵生守墨還全器臨池早著名春闈擕就試軍幕載將行不獨陳兼能助筆耕莫嫌涓滴潤深染古今情洗處無瑕玷添時識滿盈蘭亭如見用敲戞有金聲尚書會仙亭詠薔薇聮句夤坐中聮四韻晚歸補緝所聮因成一篇結緑根株翡翠莖勾芒中夜刺猩猩景陽粧赴嚴鐘出楚峽神教暮雨晴躑躅豈能同日語玫瑰方可一時呈風吹嫩帶香苞展露灑啼思淚點輕阿母蘂宫期索去昭君榆塞闕賫行藂髙恐礙含泥燕架隱冝棲報曙鶯鬪日只憂燒密葉映階疑讓雙旌舍煙散纈佳人惜落地遺鈿少妓爭丹渥不因輸繡段錢圎誰把買聲海棠若要分流品秋菊春蘭兩恰平和尚書詠泉山瀑布十二韻名齊火浣溢山椒誰把驚虹挂一條天外倚來秋水刃海心飛上白龍綃民田鑿斷雲根引僧圃穿通竹影澆噴石似煙輕漠漠濺崖如雨冷瀟瀟水中𧖟緒鞔蒼壁日裏虹精絳霄寒潄緑隂仙桂老碎流紅艷野桃夭千尋練㵼年長在六出花開夏日消急恐劃分青嶂骨久應繃裂翠微腰濯纓便可譏漁父洗耳還冝傲帝堯林際猿猱偏得飯岸邊烏鵲擬為橋赤城未到詩先寄廬阜曽遊夢已遙數夜積霖聲更逺郡樓欹枕聼良宵自詠十韻只合滄洲釣與耕忽依螢燭功成未遊宦路叨卑宦才到名場得大名梁苑二年陪衆客溫陵十載佐雙旌錢財盡是侯王惠骨肉偕承里巷榮拙賦偏聞鐫印賣惡詩親見畫圖呈使宅行夤回文八體詩圖兩面庚午秋樓赴宴親見每一倒翻讀八韻也多栽桃李期春色濶鑿池塘許月明寒益衾裯饒美寢出乘車馬免徒行粗支菽粟防飢歉薄有杯盤送迎僧俗共鄰棲隱樂妻孥同愛水雲清如今便死還甘分莫更嫌他白髮生東風解凍省試暖氣飄蘋末凍䀶銷水中扇沈𥘉覺泮吹海旋成空入律三春照朝空萬里通岸分天影濶色照日光融波起輕搖緑鱗遊乍躍紅殷勤排弱羽飛翥趂和風和僕射二十四丈牡丹八韻帝王城裏看無故亦無新忍摘都緑借移栽未有因光隂嫌太促開落一何頻羞殺登墻女饒將解佩人蘂堪靈鳯啄香許白龍親素練籠霞曉紅粧帶臉春莫辭終席醉易老少年身買取歸天上寧教逐世塵釣絲竹藋藋拂清流堪維舴艋舟野蟲懸作餌溪月曲為鈎雨潤搖長風吹繞指柔若將諸樹比還使緑楊羞𧖟婦非堯女漁人是子猷湖邊舊栽處長映讀書樓五言律詩二十一首旅次寓題胡為名利役來往老關河白髮隨梳少青山入夢多途窮憐抱疾世亂恥登科却起漁舟念春風釣緑波釣臺金門誰奉詔碧岸獨垂鈎舊友秪樵叟新交惟野鷗嘉名懸日月深谷化陵丘便可招巢父長川好飲牛贈嚴司直承家居闕下避世出關東有酒劉伶醉無兒伯道窮新詩吟閣賞舊業釣臺空雨雪還相訪心懷與我同贈東方道士葫蘆窗畔挂是物在其間雪色老人鬢桃花童子顔祭星秋日採藥曉登山舊放長生鹿時銜瑞草還題僧壁香厨流瀑布獨院鎖孤峯紺髮青螺長文茵紫豹重邜枯皆化燕蜜老却成蜂明月留人宿秋聲夜著松和人經隋唐間戰處孤軍前度戰一敗一成功卷斾早歸國卧尸猶臂弓草間腥半在沙上血殘紅傷魄何為者五湖垂釣翁追和常建嘆王昭君紅顔如朔雪日爍忽成空淚盡黃雲雨塵消白草風君心爭不悔恨思竟何窮願化南飛燕年年入漢宫贈董先生壽歲過於百時間到上京餐松雙鬢嫩絶粒四支輕雨雪思中嶽雲霞夢赤城來年期受籙何處待先生河流洪流盤砥柱淮濟不同波莫訝清時少都緣曲處多逺能通玉塞髙復接銀河大禹成門嶮為龍始得通題南寺久别猿啼寺流年劫逝波舊僧歸塔盡古瓦長松多壁蘚昏題紀窗螢散薜蘿平生英壯節何故旋消磨北山秋晚十載衣裘盡臨寒隱薜蘿心間緣事少身老愛山多玉露催收菊金風促剪禾燕秦正戎馬林下好婆娑昔遊昔遊紅杏苑今隱刺桐村歲計懸僧債科名負國恩不書胝漸穩頻鑷鬢無根惟有經邦事年年志尚勤酒胡子紅筵絲竹合用爾作歡娛直指寧偏黨無私絶覬覦當歌誰袖應節旋輕軀恰與真相似氊裘滿頷鬚弔崔補闕近來吾道少慟哭博陵君直節巖前竹孤魂嶺上雲搢紳傳確論丞相取遺文廢却中興䇿何由免用軍弔赤水李先生三年悲過隙一室類銷氷妻病入仙觀子窮隨嶽僧荒丘寒有雨古屋夜無燈往日清猷著金門幾欲徵香鴨不假陶鎔妙誰教羽翼全五金池畔質百和口中煙觜鈍魚難啄心空火自燃御爐如有闕須進聖君前雞名參十二屬花入羽毛深守信催朝日能鳴送曉隂峩冠裝瑞璧利爪削黃金徒有稻粱感何田報德音白鴿舉翼凌空碧依人到大邦粉翎棲畫閣雪影拂瓊忩振鷺堪為侣鳴鳩好作雙狎鷗歸未得覩爾憶晴江龜行止竟何從深溪與古峯青荷巢瑞質緑水返靈蹤鑽骨神明應酬恩感激重仙翁求一卦何日脫龍鍾銀結條冠子日下徴良匠宫中贈阿嬌瑞蓮開二朵瓊縷織千條蟬翼輕輕結花紋細細挑舞時紅袖舉纎影透龍綃蜀葵劔門南面樹移向會仙亭錦水饒花艷岷山帶葉青文君慚婉娩神女讓娉婷爛熳紅兼紫飄香入繡扄七言絶詩二十八首鏡中覽懷晨起梳頭忽自悲鏡中親見數莖絲從今休説龍泉劒世上恩讐報已遲楚國史六國商於恨最多良弓休綰劒休磨君王不剪如簧舌再得張儀欲奈何張儀荆楚南來又北歸分明舌在不應違懷王本是無心者籠得蒼鷹却放飛薔薇朝露灑時如濯錦晚風飄處似遺鈿重門剩著黃金鎖莫被非瓊摘上天大夫松五樹旌封許歲寒挽柯攀葉也無端爭如澗底凌霜節不受秦皇亂世官杏園杏蘂簫聲好醉鄉春風嘉宴更無雙慿誰為謔穆天子莫把瑶池並曲江蕉葉緑綺新裁織女機擺風搖日影離披只應青帝行春罷間倚東墻卓翠旗路旁草楚甸秦原萬里平誰教根向路旁生輕蹄繡轂長相踏合是榮時不得榮讀漢紀布衣空手取中原徑卒雄師不足論楚國八千秦百萬豁開胸臆一時吞李夫人二首不望金輿到錦帷人間樂極即須悲若言要識愁中貌也似君恩日日衰又招得香魂爵少翁九華燈燭曉還空漢王不及吳王樂且與西施死處同明妃不用牽心恨畫工帝家無策及邊戎香魂若得升明月夜夜還應照漢宫馬嵬二百年來事逺聞從龍誰解盡如雲張均兄弟皆何在却是楊妃死報君依韻贈南安方處士五首七貴五侯生肯退利塵名網死當拋黔婁寂寞嚴陵卧借問何人與結交又休羸蹄踏雪霜書成何處獻君王嵩山好與浮丘約三十六峯雲外鄊又百萬僧中不為僧比君知道僅誰能無家寄泊南安縣六月門前也似氷又兩鬢當春却似秋僻居誇近野僧樓落花明月皆臨水明月不流花自流又晉楚忙忙起戰塵龔黃門下有髙人一畦雲薤三株竹席上先生未是貧依韻答黃校書慈恩雁塔參差榜杏苑鶯花次第遊白日有愁猶可散青山髙卧竟無愁傷進士謝庭皓獻書猶未達明君何事先遊岱嶽雲惟有春風護冤魄與生青草蓋孤墳聞司空侍郎下世園綺生雖逄漢室巢由死不謁堯階八徴不起夫君殁去何人葬合取夷齊隱處埋偶題二首買骨須求騏驥骨愛毛冝採鳯凰毛駑駘燕雀堪何用仍向人前價例髙又賦就長安振大名斬蛇功與樂天爭歸來延壽溪頭坐終日無人問一聲猿宿有喬林飲有溪生來蹤迹逺塵泥不知心更愁何事每向深山夜夜啼追和賈浪仙古鏡誰聞黃帝喬山冡明月飛光出九泉狼籍蘚䀶磨不盡黑雲殘點汙秋天蝴蝶二首不並難飛繭裏蛾有花芳處定經過天風相送輕飄去却笑蜘蛛謾結羅又苒苒雙雙拂畫欄佳人偷眼再三看莫欺翼短飛長近試就花間撲已難新刺襪素手春溪罷浣沙巧裁明月半彎斜齊宫合贈東昏寵好步黃金􅔽蓞花釣磯文集卷第六
