body:
  text: 徐夤昭夢著詩七言律詩五十二首草木草木無情亦可嗟重開明鏡照無涯菊英空折羅含宅榆莢不生原憲家天命豈慿醫藥石世途還要辟􅆉沙仙翁乞取金盤露洗却蒼蒼兩􅁂華松澗底青松不染塵未逄良匠競誰分龍盤勁節巖前見鶴唳翠梢天上聞大厦可營誰擇木女蘿相附欲凌雲皇王自有増封日修竹徒勞號此君竹翠染琅玕粉開東南移得㑹稽栽遊絲掛處漁竿去緑水夾時龍影來風觸有聲含六律露霑如洗絶浮埃王猷舊宅無人到抱却清隂蓋緑苔郡侯座上觀琉璃瓶中遊魚寳器一泓銀漢水錦鱗􅅻動即先知似􅆂明月波寧隔欲上輕氷律未移薄霧來分咫尺碧綃籠處校毫􅁵文翁未得沉香餌擬置金盤召左慈尚書打毬小驄歩驟最竒因有所贈善價千金未可論燕王新􅀉小龍孫逐將白日馳青漢銜得流星入􅀞門歩驟最能隨手轉性靈多恐會人言桃花雪􅀧多雖貴全假當塲一顧恩尚書惠蠟面茶武夷春暖月􅀄圓採摘新芽獻地仙飛鵲印成香䗶片啼猿溪走木蘭􅂳金槽和碾沉香末氷椀輕􅆂翠緑烟分贈恩深知最異晚鐺冝煮北山泉勸酒休向樽前愬羽觥百壷清酌與君傾身同緑􅀣年年老事比紅塵日日生六國英雄徒反覆九原松栢甚分明醉郷路與乹坤隔豈信人閒有利名斷酒因論沉湎覺前非便碎金罍與羽巵採茗早馳三蜀使看花甘􅀒五侯期􅆤閒近劉伶傳座右新銘管仲辭此事十年前已說匡廬山下老僧知憶舊山澗竹巖雲有舊期二年頻長鬂􅁁絲遊魚不愛金杯水棲鳥敢求瓊􅀣枝陶景戀深松檜􅀮留侯抛却帝王師龍爭虎攫皆閑事數叠山光在夢思西華五千仭有餘神秀一一排雲上泬寥叠嶂出􅀜分二陜殘崗過水作中條巨靈廟破生春草毛女峯髙入絳霄拜祝金天乞隂德爲民求主降神堯嵐似屏風嵐似屏風草似茵草􅁁時膾錦花鱗山中􅌠相陶弘景谷口耕夫鄭子真宦達到頭思野逸才多未必􅀏清貧君看東洛平泉宅只有年年百卉春憶潼􅀜洞􅊤䨇扉入到􅀄似從深穽覩髙虚天開白日臨軍國山夾黃河護帝居隋煬逺遊冝不及奉春長策竟何如須知皇漢能扄鐍延得年四百餘憶潼􅀜早行行客豈看仙掌月落星斜照濁河泥故山逺處髙飛鴈去馬鳴時先早雞􅀜栁不知誰氏種岳碑猶見聖君題蒭蕘十軸僮三尺豈謂青雲便有梯鴻門耨月耕烟水國春薄徒應􅀏作農人皇王尚法三推禮白杜寧忘四體勤雨洒簔衣芳草暗鳥啼雲􅀣小村貧猶勝墮力求飱者五斗低腰走世塵憶長安行舊歴􅀜中憶廢興􅆫奢須戒儉須慿火光只是燒秦塜賊眼何曾視㶚陵鐘鼓煎催人自急侯王更換恨難勝不如坐釣清溪月心共寒潭一片澄憶長安上省年忽憶􅀜中逐計車歴坊􅀐馬信空虚三秋病起新八月夜長思舊居宗伯帳前曾獻賦相君門下再投書如今說着猶堪泣兩宿都堂過歳除長安述懷黃河氷合尚遊知命知時肯躁求詞賦有名堪自􅀒春風落第不曽羞風塵色裏凋䨇鬂撃鼓聲中歴幾州十載公卿早言屈何須課夏更􅁳捜長安即事三首抛擲清溪舊釣鈎長安寒暑再環周便隨鶯羽三春化只識蟬聲一度愁掃藻自憐窓雪照上天寧愧海槎流明時則待金門詔肯羡班超萬户侯又無酒窮愁結自舒飲河求滿不求餘身登霄漢平時第家得干戈定後書冨貴敢期蘇季子清貧方見馬相如明時用即匡君去不用何妨却釣魚又拖紫腰金不要論便堪歸􅀮白雲村更無名籍強金榜豈有花枝勝杏園綺席促時皆國器羽觥飛處盡王孫髙眠亦是前賢事爭報春闈莫大恩東京次新安道中賊去兵來􅀊月長野蒿空滿壞墻匡旋從古轍成深谷幾見金輿過上陽洛水送年催代謝嵩山擎日拂穹蒼殊時異世爲儒者不見文皇與武皇山隂故事坦腹夫君不可逄千年猶在播英風紅鵞化鶴青天逺綵筆成龍緑水空愛竹只應憐直節書裙多是爲竒童吹笙嶺登山後東注清淮豈有窮温陵即事早年師友教爲文賣却魚舟網典墳國有安危期日諫家無儋石暫從軍非才豈合攀丹桂多病猶堪伴白雲爭得千鍾季孫粟滄洲歸與故人分温陵殘臘書懷􅀉崔尚書濟川無楫擬何爲三傑還從漢祖推心學庭槐空發火鬂同門栁即垂絲中興未遇先懐䇿除夜相催也課詩江上年年接君子一盃春酒一枰棊義通里寓居即事家住寒梅翠嶺東長安時節詠途窮牡丹窠小春餘雨楊栁絲踈夏足風愁鬂已還年紀白衰容寧藉酒盃紅長卿甚有凌雲作誰與清吟遶帝宫上陽宮詞􅀧􅀧苔錢上玉墀日斜空望龍西粧臺塵暗青鸞掩宫􅀣月明黃鳥啼庭草可憐分雨露君恩深恨隔雲􅅺銀蟾借與金波路得入重輪伴羿妻西寨寓居閑讀南華對酒盃醉携笻竹畫蒼苔豪門有利人爭去陋巷無權客不來解報可能醫病雀重燃誰肯煦寒􅁅嚴陵萬古清風在好棹東溪詠釣臺又功智爭馳淡薄空猶懷忠信擬何從鴟鳶啄腐疑雛鳳神􅀑欺貧􅀏伯龍烈日不融霜鬂雪病身全仰竹枝笻崇侯入輔嚴陵退堪憶啼猿萬仭峯題福州天王閣絶境冝棲獨角仙金張到此亦忘還三門裏面千層閣萬井中心一朶山江抝碧灣盤洞府石排青壁護禪􅀜有時海上看明月輾出氷輪叠浪閒憶薦福寺南院憶昔長安落第春佛宫南院獨遊頻燈前不動惟金像壁上曽題盡古人鶗鴂聲中䨇闕雨牡丹花際六街塵啼猿溪上將歸去合問昇平詣秉鈞塔院小屋四壁皆是卿相題名因成四韻雁塔􅍴空映九衢毎看華宇毎踟蹰題名盡是台衡迹滿壁堪爲宰輔圗鸞鳯豈巢荆􅁄􅀣虬龍多蟄帝王都誰知逺客思歸夢夜夜無􅂳自過湖題琉璃院今改名景祥院一條溪遶翠巖隈行脚僧言勝五臺一本作一條溪碧遶崔嵬餅鉢偏冝向此隈農罷􅀣陰黃犢卧齋時山下白衣來松因徃日門人種路是前生長老開三卷貝多金粟語可能寺中偶題聽話金仙白相毫每來皆得解塵勞鶴棲雲路看方貴僧􅀝松門見始髙名利罷燒心内火雪霜偏垢鬂􅁁毛銀蟾未出金烏在更上層樓眺海濤山寺寓居髙卧東林最上方水聲山翠剔愁腸白雲送雨籠僧閣黃葉隨風入客堂終去四明成大道暫從䨇鬂許秋霜披緇學佛應無分鶴􅌁談空亦不妨􅀉僧偶題佛頂抄經憶惠休衆人皆謂我悠悠浮生真箇醉中夢閑事莫添身外愁百歳付於花暗落四時隨却水奔流安眠靜􅀏思何報日夜焚修祝郡侯遊靈􅀮天竺二寺丹井冷泉虚易到兩山真界實難名石和雲霧蓮華氣月過樓臺桂子青騰踏囬橋廵像設羅穿曲洞出龍更憐童子呼猿去颯颯蕭蕭下􅀣行醉題邑􅌠南塘屋壁萬古清淮照逺天黃河濁浪不相􅀜縣留東道三千客宅鏁南塘一片山草色淨經秋雨緑燒㾗寒入曉􅆤斑閩王羙錦求賢製未許陶公解印還題泗洲塔十年前事已悠哉旋被鐘聲早暮催明月似師生又没白雲如客去還來烟籠瑞閣僧經靜風打虚􅆤夜月開惟有南􅁁山色在重重依舊上髙臺東歸題屋壁塵埃歸去五湖東還是衡門一畆宫舊業旋從征賦失故人多逐亂離空恩悲盡室如懸磬却擬携家學轉􅅾見說武王天上夢無情曾與傅巖通寓題酒壺棋局似閑人竹笏藍衫老此身託客買書重得卷愛山移宅近爲隣鳴蛩閣上風吹病落葉庭中月照貧見􅀃天池波浪濶也應㳙滴濺窮鱗偶題閑補亡書見廢興偶然前古也填膺秦宫猶自拜張禄楚幕不知留范增大道豈全􅀜暦數雄圖強半屬賢能燕臺財力知多少黃金到九層寓題述懷大道真風早晚還妖訛成俗汚乾坤宣尼旣没蘇張起鳯鳥不來雞雀喧蒭少可能供􅂹子草多誰復訪蘭蓀堯廷忘却徴元凱天闕重􅀜十二門將入城靈口道中作路上長安咫尺閒㶚陵西望接秦源依稀日下分天闕􅀮映雲􅁁是國門錦袖臂鷹河北客青桑鳴雉渭南村髙風九萬程途近與報滄洲欲化鯤新屋耳順何爲土木新叔孫墻屋有前聞縱然一世如紅葉猶得十年吟白雲性逸且圖稱野客才難非敢傲明君清甜數尺沙泉井平與隣家晝夜分新葺􅈋堂二首剪竹誅茅就水雲静中還得保天真只聞神􅀑害盈滿不見古今爭賤貧􅀣影便爲廊廡屋草香權當綺羅茵堦前一片泓澄水借與汀禽活紫鱗又耨水耕山息故林壯圗嘉話􅀒前心素絲鬂上分愁色絡緯床頭和苦吟筆硯不才當寸火方書多誑罷燒金同年二十八君子遊楚遊秦斷好音茒亭鴛瓦虹梁計已踈織茅編竹稱貧居剪平恰似山僧笠掃静真同道者廬秋晚捲􅄕看過雁月明凭檻數跳魚重門公子應相􅀏四壁風霜老讀書客㕔移却松筠致客堂淨泥環堵貯荷香􅈋衡只要免風雨藻梲不須髙棟梁豐蔀仲尼明演易作歌五子恨雕墻燕臺漢閣王侯事青史千年播耿光詠冩真寫得衰容似十全閑開僧舎靜時懸瘦於南國從軍日老却東堂射策年潭底看身寧有異鏡中引影更無偏借將前輩真儀比未愧金鑾李謫仙放榜日喧喧車馬欲朝天人探東堂榜已懸萬里便隨金鸑鷟三台仍借玉連錢南海相公此時在京䝉借鞍馬人僕花浮酒影􅊮霞爛日照衫光瑞色鮮十二街前樓閣上捲􅄕誰不看神仙曲江宴上呈諸同年鷦鷯驚與鳯凰同忽向中興遇至公金榜連名昇碧落紫花封敕出瓊宫天知惜日遲遲暮春爲催花旋旋紅好是慈恩題了望白雲飛盡塔連空渤海賔貢髙元固先輩閩中相訪云本國人寫得夤斬蛇劒御溝水人生幾何賦家皆以金書列爲屏障因而有贈折桂何年下月中閩山來問我雕􅆉肯銷金翠書屏上誰把蒭蕘過日東郯子昔時遭孔聖由余往代諷秦宫嗟嗟大國金門士幾箇人能振素風釣磯文集卷第八
