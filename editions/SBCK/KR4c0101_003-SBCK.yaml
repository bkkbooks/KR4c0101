  text: 唐秘書省正字先輩徐公釣磯文集卷第三
  hash: sha256:eb088c66354fd3df8795a6150ab9b6c1b75ae275e6971f6df4a5e984d79cf2ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_003-1a}
body:
  text: 徐夤昭夢著賦太極生二儀賦太極何名其形混成畫一氣以中斷區二儀而始生厚載者所以凝其濁髙明者所以厚其清吾甞究天地之􅀄洞肧腪之始本無兆以無朕竟何聽以何視茫乎大醉之郷寂若無生之理我形影以都秘我音響而未起混沌將至唯聖乃出隨我聲而發音響逐我象而設形質於是上泝無邉昭然廓然營空碧而星辰錯落豁東西而烏兎髙懸漢玉奚水河銀􅂚泉無得而踰六律而宗成大化不言而信四時而飛作流年此一儀者天也上以昭宣復以一撮之多九垓攸布聳華嶽以西峙洶滄溟以東注蔓延生植滄洋制度何舟何楫凌開白浪爲程誰馬誰車碾破青山作路此一儀者地也厚惟固護嗚呼太極故兮二儀新二儀新兮四象分我目明兮所見耳餘聽兮所聞五色成章炳煥而光昭朴素八風從律凄凉而吹散氤氲彼天得一而清地得一而寧秉造化之鈞軸絡虚無之紀經莫不潤之以風雨鼓之以雷霆掲大象以垂象鞠無形而有形然後伏羲聖黃帝靈􅀛龍􅀒而乾坤定位文籍生而詐僞開扄但見髙極九重下盤四角日炤朝兮月炤夜融爲川兮結爲嶽旣將入我死而出我生亦何必剖先天之清濁員半千􅀃三陣賦天地人陣者其誰以測惟聖主之嘉問伊賢臣而洞識莫不陳七德機要叙三才楷式願同尚父干戈永佐於周朝敢學宣尼爼豆將言於衛國乃曰臣聞天陣則上考璿樞明孤計虚運星宿而吾君堯舜叱風雷而敵國丘墟斯蓋出黃石之妙訣又武侯之秘書臣謂其不然也出兵者在乎信及寒暑義如時雨春發生兮當養士冬肅殺兮當耀武斯則得天道兮合天時不可辰天時而逆天取此天陣以明焉微言可補又聞地陣則察土分疆坤盤艮長隨向背而翼鵝鸛順山川而羅紀綱所以韓信背水而趙滅孟氏焚舟而􅀳藏臣復謂其不然也其用兵者在乎饒金冨粟兵雄食足先耕而九載思蓄後戰而三軍不分斯則分地利而得地財豈有兵未征而農不斸此地陣以明焉微言可録又聞人陣則勇氣生風精神貫虹夭矯而常山躍地彎環而皎月懸空可與樂毅論將穰苴比功臣復謂其不然也且爲師者在乎帥師將肅連營敦睦忠爲甲兮信爲胄身爲弓兮德爲轂指日烹齊國之牛反掌拾秦原之鹿此則協人意而得人心豈有人意和而兵不服此人陣以明焉微言可祝髙宗乃知天陣則不必占彼星􅄤地陣則不必恃其山川人陣則不必仗其驍勇唯德義而三軍勝焉文王葬枯骨賦因掘地以及泉見窮塵之委骨陳􅁙禮以外備實仁心之内發義之克著幽可貫於􅀑神德之孔彰明可爭於日月􅀄其取象茫洋開蕪鑿荒幽宅幾壞遺骨遂彰伊彼役者奏於文王王乃掩袂而矚興懐而傷莫不蔓草縈白隂苔染蒼恐是徃古豪傑昔時聖哲澤物名光忠烈宛是其死誰曰不然骨肉歸土神魂升天深谷爲陵波可知而蔑爾佳城不見爲我主以􅀵焉於是召有司其明享賻以衿禭蓋諸泉壤以遐返邇飛聲走響遂使億兆民庶以來歸八百諸侯之企仰設若不逄君子倐遇小人必􅀿視同塵土棄若􅁅塵旣丘墟而莫問在封􅀣以無因則烏鳶是啄螻蟻是親幸將不遇小人獲遭君子而乃覩之而骨驚感之以心死爰拾之於彼􅁙之於此蓋將斯骨以喻我以已不欲而行之於彼可使見之者悲聞之者喜以至誠賔萬國之臣若滄海走百川之水嗟夫存殁殊􅂗幽隂鍳乎爾䰟奚在爾肌以枯何得上測於睿哲而再向其塗芻則宗周之仁也不獨及於有情而必軫於觸􅀋祝網之帝不足以言其仁泣􅇳之君焉可以叶其義得不啓之十代延之百祀俾後之制禮垂教將掩骼埋胔者也且王於邦而至大骨於物而至微我不以大而自貴不以微而有違以仁不足爲我罪以物失所爲我非是以勞瘁無斁皇寧甚稀骨尚惻於窮泉下土豈惟於獸走禽飛故得九齡者上帝所錫九國者西方允歸以孝治天下也亘萬古以光輝五王宅賦明皇以孝悌爲此地宅而宸遊永賖凄凉而境空鏁悵望而渚已遐鳳去鸞歸秋葉落梧桐之􅀣年來歳改春風遺棠棣之華當其龍虎俱來蚪龍並轡觀風而玉輦停駕選勝而金鰲􅀒地天師魯匠新土木以宏規月殿雲樓破荆榛之積翠旣而甲第煌煌維城道帝子天子肅睦而寧王薛王綵霧彤霞從仙都之八面風臺水榭引􅅾島於中央不􅀋遷都平分於宅爲星之渚同數比奕之龍並跡聖主之千聲羯鼓洛水風清岐山之數調胡琴嵩山月白瑞氣飄空蘭深麝濃連雲之飛閣鏁鳳象海之清地蟄龍解愠風帝舜之琴雅奏興歌立德太康之弟相從莫不以嘉􅀣􅄥烟崇牖硋日金聲玉韻以總起夏蕚春叢而剪出虹梁綺棟晐天地以量功舞態歌容掌神仙而比質一旦衮冕參差外遐紫微華屋之帳幄􅆉蠧深院之欒櫨燕飛時移而玉笛難㝷清商冺滅事徃而金牌尚在御墨依稀徒令攀詠皇風追思聖德傷宴御以綿起遶周垣而嘆息王侯之地宅雖多未若開元之有國駕幸華清宫明皇帝號天上來華清宫兮雲際開離紫禁而千官捧日出清門兮萬􅀐屯雷巫山之翠珮珠璫皆移雲雨洞府之霓旌絳節盡去􅅾萊當其鯨海澄波驪山叠翠架瓊宫玉殿之宏絶鎻萬户千門之祕􅃉上以我無爲而國無事記一千年之歴數冨有寰瀛起五十里之烟霞長懸夢寐於是躍馬驂龍烟馭風從從我者七貴中貴翊我者姚公宋公􅀩茸之組繡烟花香隨輦路錯落之星長日月影射虚空及其鰲􅀒瑶臺檠生玉蘂翔鴛振鷺以環列九棘三槐而森峙玉帛駢積梯航萃止隋侯明珠兮􅅚車馬霧縠雲羅兮縈歩履飄蘭散麝薫昭􅀿之香落翠遺珠遍鬻新豐之市鸑鷟麒麟禎祥日臻朱閣拜􅀇元皇帝金車迎虢國夫人其有夜光枕貴玉蘂冠新眷五王之燕語􅀝六相於陶鈞其或露冷仙掌波出渭津河漢佳期七夕會牽牛之什雲天勝賞中秋迎顧兎之倫莫不􅀛􅂦祈年龍奉職真人羽客兮薦方術朱草靈芝兮表生殖詩成而玉甕題新雲滿而温泉暖極霄可止期驂彩鳳之翔光景難留誰束金烏之翼諫切雖納思深半惑禄山已變猶期其十月來王林甫旣合省其多方蠧國竹語絲喧中元上元葉靖之靈丹舊得花奴之羯鼓新翻人閒有大貝明珠皆歸戚里世上無清歌妙舞不屬梨園是何樂極悲來時移代促燕中之鐡馬俄起環上之羅衣莫贖華清宫觀兮閴無人山青兮水緑􅂯幸華清宫明皇以旣剪漁陽塵清帝郷自蜀郡而􅀄還輦輅幸華清而幾隔星霜巍峩而紫府洪都重開聖日牢落而金門玉户幾閉春光是何樂極難期繁華易時易而鳯髻成夢歳晚而龍顔皓首嬪嬙零落寧逄舊日之人􅂄艾扶携尚獻新豐之酒但見禁栁愁烟宫槐暮蟬苔昬而鏡落金殿岸改而湯催玉蓮螓首蛾眉遺跡而空存處處落花流水無言而但送年年足令左右含悲君王墮􅊿塵􅅺漸委於花逕歳月濳更於蓂莢金沙洞濶凄凉而午夜流泉玉蘂峯髙騷屑而一宫紅葉榮謝相催心腸似摧天在而俄懸二日星移而幾别三台金㦸凌霜劔閣而曾悲幸去銀蟾皎夜月宫而長憶遊來蟬􅀉花鈿星流􅀏臉陽䑓之吉夢􅀄斷岱嶽之香魂已斂解語之珍禽不見琪􅀣空髙長生之白鹿空還朱扉半掩象薦塵緇犀屏影移雪衣籠在霜殿松痿雲母波輕遶岸之清漣自改相思􅀣老滿山之紅實空垂已而玉笛休吹霓裳罷制秦原杳杳以西接渭水悠悠而東逝空吟其刻木牽絲比人閒世卞莊子刺虎賦人雖至靈虎且至猛此靈智以終刺彼猛暴以何騁固在戮力亦唯三省誰氏之子人爲卞莊有力如虎提戈若霜爾聞力我則非敵我聞知爾何以當始其三徑無人二虎遇肉俱貪而送涎豐草不嘯而風停􅃉谷我將愛其文而玩其革必冀扼其喉而剖其腹然而以寡制衆彼䨇我獨雖言肉視詎得心服乃即客前而言曰貪夫狥利君子俟時且肉之羙者虎乃啖斯啖飽則鬬鬬極則疲威稜之大應以縮爪牙之利何以施將一刺矣必兩中之亦猶秦王克韓魏俱㓕漁父獲鷸蚌相持物之理也君冝念兹不然則虎非爾所得爾爲虎所資於是拜其言伺其便不躁進不自衒思曹劌之往畫法李陵之獨戰俄而肉旣盡勢果爭􅚖牙而龍劔森齒牙騞而雲雷霹聲􅀣㧞石裂陵摧谷傾風毛羽血以狼藉地轉天旋而震驚於是氣衰力怠彼竭我盈巖隂而歸鳥皆散野逈而殘陽半明􅀒者可以檻勝者可以烹卞莊乃肉袒歘起持矛迅征足奔而飛箭寧速身㨗而鴻毛未輕爾將極我時以亨遂一麾而並進如拾芥以將行射絶塞之石頭胡爲等價去南山之白額未足齊名我則視若井中料如几上斬蛟奪劔者其心未壯探龍取珠者其事應誑蓋感人進言神符厥望設若不取善言而善何以師不待物聞而物何以䘮如此則争雄􅀒勢之徒冝覧斯而惻愴鑄百鍊鏡賦十數鍊者未足爲明一百鍊者方爲至精祝皇帝以終貢命良工而鑄成威凝碧渚流泉蛟龍欲活折下青天皎月蟾兎如生淮南王以地産真金天生哲匠開爐呈造化之術爲鏡照星辰之象可以人閒第一法軒轅臺上之規天下無䨇掩秦氏宫中之狀匠者曰金雖精則不鍊不神鍊有數非百之不新又曰火爲陽晶午爲隂月陽得隂則百工備陽失隂則萬化闕臣今選五月五日之亨吉爲鍜乃礪之始卒而又就澄澈革昏沉擬犯烏光於天上乃維鷁首於江心亦以水能鑒物火能化金念器大以晚成其功乃倍及人生之不滿厥數方深况乎空斷飛烏人稀碧潯顧採艾之輪蹄􅀿難􅀼視縱升天之雞犬莫得遥臨想其爝火吞光氷壺慘冷幙金而麟鳯相次挂玉而􅈢狸難屏陶鈞即數同枝頭赤仄之多炤燭無瑕啓匣裏青鸞之影王曰吾秦之鏡也可以照肝膽可以慴奸邪吾將驗彼彼將妄􅁘且閻樂之奸邪􅂚􅀮趙髙之肝膽誰遮遽至於素車白馬絶國亡家今斯鏡也用其鍳形容定妍醜比君德之不昧論臣心之無茍於是持百鍊而獻九重惟拜手稽首􅀇宗御註孝經賦明皇以孝理生靈財修紫庭表後主之新鑒注先王之舊經立身行道之文昭如繡縟資父事君之要煥若丹青開元中以儒道風行皇明日皎刪六籍之奥秘定百家之多少顧老氏經標􅀇黙義理猶淺豈宣尼典急君親源流未顯於是鏡豁宸􅇆天開聖聰由粗及精刪踳駁於千行之内從無入有縯絲綸於百日之中可以來者無猜學徒洞識三千罪盡顯天鑒十八章皆流御墨九門翕集清傳鄒魯之風萬室雍熈普詠文明之德浩浩沄沄詳言紏紛素言行在而猶􅀮聖主躬修以具分髙深如山嶽江河遐開地理炫燿比星辰日月上燭天文蓋以首毁強秦遥興大漢歳月頗謂其綿邈傳冩或多其紊亂朕今屬事比辭飛文染翰冀使爲臣爲子之自我而行窮經博古之人從吾屢讃皎皎明明神功坐成甲乙之良宵不輟曽顔之宻行俱呈􅀭名後代之人俾傳白社在上不驕之義自表皇情故得極思九重研精一卷旌孝悌以爲教剪繁蕪而罔倦然後勒貞石而建髙臺萬祝千齡兮誰激勸割字刀子賦物有至大而無所爲物有至小而功且竒當彩筆臨文之際見銛鋒入目之時改雕􅆉篆刻之非重修麗藻正垂露崩雲之誤盡在瑕疵觀其寸鐡雖輕尺書可理磨礱本自於良匠玩愛式歸於君子封章是假常挑鸞鳯之蹤淬礪非多不損盃盂之水文近􅀝馬多參解牛剗􅁦能新於鳥跡摧剛幾觸於銀鉤削染翰之繁蕪入行宛定􅀏磨鈆之濫拙一割何求則知用自名賢成因在冶剔瓊牋而䟽玉無異映月字而連環是假通書􅆤之琴鳥欲謂割雞制遷史之姓名何慙斬馬起余之思在青雲憶王祥之贈者釣磯文集卷第三
