  text: 唐秘書省正字先輩徐公釣磯文集卷第七
  hash: sha256:c5660f846bf8bd4735ec5e1f76f260ed5f0c694489c8f0711ea9060fc31343da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_007-1a}
body:
  text: 徐夤昭夢著詩七言律詩五十二首華清宫十二瓊樓鎻翠微暮霞遺却六銖衣桐枯丹穴鳯何去天在􅂦湖龍不歸􅄕影罷添新翡翠露華猶濕舊珠璣君王魂斷且向􅅾瀛伴貴妃再幸華清宫腸斷將軍改􅁙歸錦􅇸香在憶當時年來却恨相思􅀣春至不生連理枝雪女塚頭瑶草合貴妃池裏玉蓮衰霓裳舊曲飛霜殿夢破䰟驚絶後期鬂髪鬂添華髪數莖新羅雀門前絶故人减食爲縁踈五味不眠非是守庚申深園竹緑齊抽笋古木蛇青白脫鱗天地有爐長鑄物濁遺塊待陶鈞喜雨上主人尚書天皇攘袂救神龍雨我公田兆􅀊豐幾日淋漓侵暮角數宵滂沛徹晨鐘細如春霧籠平野猛似秋風擊古松門下十年耕稼者坐來偏憶翠微峯廽文詩二首飛書一幅錦紋囬恨冩深情􅀉雁來機上月殘香閤掩霏霏雨罷歌終曲漠漠雲深滿酒盃歸日幾人行問卜徽音想望􅀝髙䑓又輕航數􅀧千峯碧水接雲山四望遥晴日海霞紅靄靄曉天江􅀣緑迢迢清波石眼泉當檻小逕松門寺對橋明月釣舟漁浦逺傾山雪浪暗隨潮不把漁竿不把漁竿不灌園策笻吟遶緑蕪村得爭野老眠雲樂倍感閩王與善恩鳥趂竹風穿静户魚吹烟浪噴晴軒何人買我安貧趣百萬黃金未可論古往今來古往今來恨莫窮不如沉醉卧春風雀兒無角長穿屋鸚鵡能言却入籠栁惠豈嫌居下位朱雲直去􅃌三公閑思郭令長安宅草没匡墻舊事空十里煙籠十里烟籠一逕分故人迢逓乆離群白雲明月皆由我碧水青山忽贈君浮世宦名渾似夢半生勤苦謾爲文北邙坡上青松下盡是鏘金佩玉墳偶書巧者多爲拙者資良籌第一在乗時市門逐利終身飽谷口躬耕盡日飢瓊􅅼鬻來中燕石􅅾蒿芳處楚蘭衰髙皇冷􅀏重瞳客蓋世㧞山何所爲潤屋潤屋豐家莫妄求眼看多是與身讐百禽羅得皆黃口四皓山居始白頭玉爍火光爭肯變草芳﨑岸不曽秋朱門粉署何由到空􅀉新詩謝列侯退居鶴性松心合在山五侯門舘怯趨旋三年卧病不能免一日受恩方得還明月送人松驛路白雲隨馬入柴􅀜􅀏他范蠡貪惏甚相罷金多始退閑閑門閉却閑門卧小􅆤更何人與療膏盲一生有酒唯和醉四大無根可預量骨冷欲針先覺痛肉頑頓炙不成瘡漳濵伏枕文園渴盗跖蹤横似虎狼開􅆤閉户開􅆤寢又興三更時節也如氷長閑便是忘機者不出真如過夏僧環堵豈慚蝸作舎布衣寧假鶴爲翎薔薇花盡薰風起緑葉空隨滿架藤燈花􅃛蠟燒銀却勝栽九華紅艶吐玫瑰獨含冬夜寒光折不傍春風煖處開難見只因能送喜莫挑唯恐墜成􅁅貪膏附􅀬多相誤爲報飛蛾罷拂來東歸出城留别知己常􅀩屈指許非才三載長安共酒盃欲别未攀楊栁贈相留擬待牡丹開寒隨御水波光散暖逐衡陽雁影來他日因書問衰颯東溪須訪子陵臺詠懷愁花變出白髭鬚半世辛勤一事無道在或期君夢想貧來爭柰􅀑椰榆馬卿自愧長嬰疾顔子誰憐不是愚借取秦宫臺上鏡爲時開照漢妖狐郊村獨遊􅀊閏憐暦候遲出門惟與野雲期驚魚擲上緑荷芰棲鳥啄餘紅荔枝未路可能長薄命修途應合有良時市頭相者休相戯蹙􅂰先生半自知經故翰林楊左丞池亭入角紅亭䕃緑池一朝青草蓋遺基薔薇藤老開花淺翡翠巢空落羽竒春牓幾昇門下客樂章多取集中詩平生德義人閒頌身後何勞更立碑經故廣平貟外舊宅門巷蕭條引涕洟遺孤三􅀊著麻衣緑楊􅀣老垂絲短翠竹林荒著笋稀杜結僧因秋朔弔買書􅂳近葬時歸平生欲獻匡君策抱病猶言未息機潘丞相舊宅緑􅀣垂枝䕃四隣春風還是舊時春年年燕是雕梁主處處花隨落月塵七貴竟爲長逝客五侯㝷作不歸人秋槐影薄蟬聲盡休謂龍門待化鱗門外閑田數畆長有泉源因築直堤分爲兩沼左右登漪小檻前直堤髙築古平川十分春水䨇簷影一片秋空兩月圎前岸好山摇細浪夾門嘉􅀣合晴烟坐來暗起江湖思速問溪翁買釣􅂳北園北園乾葉旋空枝蘭蕙還將衆草衰籠鳥上天猶有待病龍興雨豈無期身閑不猒頻來客年老偏憐最小兒生事罷求名與利一􅆤書䇿是年支溪上要一隻白簟扇蓋頭垂釣去年就節推侍御請之􅀩惠一柄紫花紋者雖則鱗華具甚紕薄不及清源所出因就南郡陳常侍請之遂成拙句難求珍箑過炎天逺就金貂乞月圎直在引風欹角枕且圗遮日上魚􅂳但令織取無花簟不用挑爲飲露蝉莫道如今時較晚也應留得到明年招􅀮齒髪那能敵歳華早知休去避塵沙􅀑神只闞髙明里􅀝伏不干棲􅀮家陶景豈全輕組綬留侯非獨愛烟霞贈君吉語堪銘座看取朝開暮落花憶山友憶得當年接善隣苦將閑事強夫君闘開碧沼分明月各領青山占白雲近日藥方多繕冩舊來詩草半燒焚金門幾欲言西上惆悵􅀜河正用軍溪􅀮將名將利已無緑深􅀮清溪擬學仙絶却腥羶勝服藥斷除盃酒合延年蝸牛殻陋寧同舎榆莢花開不是錢鸞鶴乆從籠檻閉春風却放􅁓爲鳶酒醒酒醒欲得適閑情􅀐馬那勝䇿杖行天暖天寒三月暮溪南溪北兩村名沙澄淺水魚知釣花落平田鶴見耕望斷長安故交逺來書未說九河清夢斷夢斷紗􅆤半夜雷别君花落又花開漁陽路逺書難􅀉衡嶽山髙雁不來􅀇燕有情穿繡户靈􅀛無應祝金盃人生若得長相許螢火生烟草化􅁅人事人事飄如一炷烟且須求佛與求仙豐年甲子春無雨良夜庚申夏足眠顔氏豈嫌瓢裏飲孟光非取鏡中妍平生生計何爲者三徑蒼苔十畆田休說休􅀃人閒有陸沉一樽閑待月明斟時來不怕滄溟濶道大却憂潢潦深白首釣魚應是分青雲干禄已無心梓桐賦罷相如􅀮誰爲君前永夜吟嘉運嘉運良時兩阻脩釣竿簔笠樂林丘家無寸白渾閑事身似浮雲且自由庭際鳥啼花旋落潭心月在水空流晨炊一筯紅銀粒憶著長安索米秋緑鬂緑鬂先生自出林孟光同樂野雲深躬耕爲食古人操非織不衣賢者心眼衆豈能分瑞璧舌多須信爍良金君看黃閣南遷客一過瀧州絶好音驕侈驕侈阽危儉素牢鏡中形影豈能逃石家恃冨身還滅顔子非貧道不遭蝙蝠亦能知日月鸞凰那肯啄腥臊古今人事惟堪醉好脫霜裘換緑醪龍蟄龍蟄蛇蟠却待申和光何惜且同塵伍員豈是吹簫者冀缺非同執耒人神劔觸星當變化良金成器在陶鈞穰侯休忌􅀜東客張禄先生竟相秦又休說雄才閒代生到頭難與運相爭時通有詔徴枚乘世亂無人薦禰衡逐日莫驚駑馬歩司晨誰要牝鷄鳴中林且作烟霞侣塵滿􅀜河未可行逐臭蒼蠅逐臭蒼蠅豈有爲清蟬吟露最髙竒多藏苟得何名冨飽食嗟來未勝飢窮寂不妨延壽考貪狂縱待算毫􅁵首陽山翠千年在好奠氷壺弔伯夷牡丹花看徧花無勝此花剪雲披雪蘸丹砂開當青律二三月破却長安千萬家天縱穠華刳鄙吝春教妖艶毒豪奢不隨韓令同時倍種霜松與辟邪又萬萬花中第一流淺霞輕染嫩銀甌能狂綺陌千金子也惑朱門萬户侯朝日照開携酒看暮風吹落遶欄収詩書滿架塵埃撲盡日無人畧舉頭尚書座上賦牡丹花得輕字韻其花自越中移植流蘇凝作瑞華精仙閣開時麗日晴霜月冷銷銀燭熖寳甌圓印綵雲英嬌含嫩臉春粧薄紅蘸香綃艶色輕早晩有人天上去􅀉他將贈董䨇成依韵和尚書再贈牡丹花爛銀基地薄紅粧羞殺千花百卉芳紫陌昔曾遊寺看朱門今再遶欄相龍分夜雨資驕態天與春風發好香多着黃金何處買輕橈挑過鏡湖光郡庭惜牡丹腸斷東風落牡丹爲祥爲瑞乆留難青春不駐堪垂淚紅艶已空猶􅀝欄積蘚下銷香蘂盡晴陽髙照露華乾明年萬葉千枝長倍芳菲借客看追和白舎人詠白牡丹蓓蕾抽開素練􅌩瓊葩薫出白龍香裁分楚女朝雲片剪破姮娥夜月光雪句豈須徴栁絮粉腮應恨帖梅粧檻􅁁幾􅀏東籬菊冷折金風待降霜憶牡丹緑􅀣多和雪霰栽長安一别十年來王侯買得價偏重桃李落殘花始開宋玉隣􅁁腮正嫩文君機上錦􅀄裁滄洲春暮空腸斷盡看猶將勸酒盃惜牡丹今日狂風揭錦筵預愁吹落夕陽天閑看紅艶只冝醉謾惜黃金豈是賢南國好偷誇粉黛漢宫冝摘贈神仙良時雖作鶯花主白馬王孫恰少年覧栁渾汀洲採白蘋之什因成一章採盡汀蘋恨别離鴛鴦鸂􅈑總䨇飛月明南浦夢􅀄斷花落洞庭人未歸天逺有書隨驛使夜長無燭照寒機年來泣淚知多少重叠成㾗在繡衣司直廵官無諸移到玫瑰花芳菲移自越王臺最似薔薇好並栽穠艶盡憐勝綵繪嘉名誰贈作玫瑰春藏錦繡風吹折天染瓊瑶日照開爲報朱衣早邀客莫教零落委蒼苔梅花瓊瑶􅀄綻嶺頭葩蕋粉新粧姹女家舉世更誰憐潔白癡心皆盡愛繁華􅀇􅁳借與三冬景謝氏輸他六出花結實和􅅅知有日肯隨羗􅅇落天涯荔枝朱彈星丸粲日光緑瓊枝散小香􅌩龍綃殻綻紅紋粟魚目珠􅆂白膜漿梅熟已過南嶺雨橘酸空待洞庭霜蠻山蹋曉和烟摘拜捧金盤獻越王又日日薫風卷瘴烟南園珍菓荔枝先靈鴉啄破瓊津滴寳器盛來蚌腹圓錦里只聞銷醉渇蕋宫惟合贈神仙何人刺出猩猩血深染羅紋遍殻鮮菊花桓景登髙事可㝷黃花開處緑畦深消災辟惡君須採冷露寒霜我自禁物早榮還早謝澗松同德復同心陶公豈是居貧者剰有東籬萬朶金画松澗底隂森驗筆精筆閑開展覺神清曾當月照還無影若許風吹合有聲枝偃只應􅀇鶴識根深冝與茯苓生天台道士頻來見􅀃似株株􅀝赤城釣磯文集卷第七
