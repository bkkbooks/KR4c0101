body:
  text: 徐夤昭夢著詩七言律詩五十二首偶吟贈表弟黃校書輅産破身窮爲學儒我家諸表愛詩書嚴陵雖說臨溪􅀮晏子還聞近市居佳句麗偷紅􅔽蓞吟􅆤冷落白蟾蜍閑來共話無生理今古悠悠事總虚輦下贈屯田何員外封章頻得帝咨嗟報國惟將直破邪身到西山書幾達官登南省鬂􅀄華厨非寒食還無火菊待重陽擬泛茶内翰好才兼好古秋來應數到君家員外與楊老丞翰林同年恩義最深贈月君山妻字月君伏見文選中顧彦光亦有贈婦因杼此詠出水蓮花比性靈三生塵夢一時醒神傳尊勝陁羅咒佛授金剛般􅀂經懿德好書添女誡素容堪画上銀屏鳴梭軋軋纎纎手􅆤户光流織女星贈垂光同年丹桂攀來十七春如今始見茜袍新須知紅杏園中客終作金鑾殿裏臣逸少家風惟筆札􅀇成世業是陶鈞他是黃閣朝元處莫忘同年射策人贈楊著作藻麗熒煌士林白華榮養有曽參十年去里君門故八􅀊能詩相座吟李廣不侯身漸老子山操賦恨何深釣魚臺上頻相訪共􅀃長安涙滿襟贈黃校書先輩璞閑居取得驪龍第四珠退依僧寺卜貧居青山入眼不干禄白髪滿頭猶著書東澗野香添碧沼南園夜雨長秋􅂼月明掃石吟詩坐諱却全無儋石儲尚書榮拜恩命夤疾中輟課惡詩二首以申攀讃明公家鑿鳯凰池弱冠封侯四海推冨貴有期天授早􅀜河多難􅃙來遲􅄧星人傑當王佐黃石仙翁識帝師昨日詔書猶漏缺未言商也最能詩又東郊迎入紫泥封此日天仙下九重三五月明闞澤百千人衆看王恭旗傍緑􅀣遥分影馬踏浮雲不見蹤借問乘軺何處客相庭雄幕卷芙蓉府主僕射王搏生日光化三年己未八月獻熊羆先兆慶垂休天地氤氲瑞氣浮李􅀣影籠周柱史􅄧星光照漢鄪侯數鍾亀鶴千年算律正乾坤八月秋勲業定應歸􅂦鼐生靈豈獨化東甌獻内翰楊侍􅀰􅆤開青􅃈見瑶臺冷拂星辰逼上台丹鳯詔成中使取白龍香近聖君來欲言温署三緘口閑賦宫詞八斗才莫擬吟雲避榮貴廟堂玉鉉待塩梅送劉常侍惜君何計更留連忍送文星上碧天杜預注通三十卷漢皇枝紹幾千年言端信義如明月筆下篇章似湧泉也日有書隨雁足東溪無吝訪漁􅂳送盧拾遺歸華山紫殿諫多防佞口清秋假滿别明君惟憂急詔歸青􅃈不得經時卧白雲千載茯苓携鶴斸一峯仙掌與僧分門前舊客期相薦猶望飛書主文春末送陳先輩之清源貧中惟是長年涯每羡君行自嘆嗟歸日捧持明月寳去時期刻刺桐花春風避酒多遊寺曉􅀐􅃪雞早入衙千乘侯王若相問飛書與報白雲家上盧三拾遺以言見黜骨鯁如君道尚存近來人事不須論疾危必厭神明藥心惑多嫌正直言冷眼靜看真好􅀏傾懷與􅀃却爲􅁈因思周廟當時誡金口三緘示後昆送王校書徃清源南國賢侯待德風長途仍借九花驄清歌早貫􅌐龍頷丹桂曾攀玉兎宫楊栁堤􅁁梅雨􅀬鷓鴣聲裏麥田空吟詩臺上如相問與􅀃磻溪直釣翁岳州端午日送人遊郴連五月巴陵值積隂送君千里客於郴北風吹雨黃梅落西日過湖青草深競渡岸傍人掛錦採羮城上女遺簮九嶷雲濶蒼梧暗與􅀃重華舊德音賀清源太保王延郴二首蕋珠宫裏謫神仙八載温陵萬户閑心地濶於雲夢澤官資髙却太行山姜牙兆􅀉熊羆内陶侃文成掌握閒應􅀏清溪舊門吏年年扶病掩柴􅀜又武榮江畔䕃祥雲寵拜天人慶郡人五色鶴綾花上勅九霄龍尾道􅁁臣英雄達處誰言命冨貴來時自逼身更待春風飛吉語紫􅅺分付與陶鈞病中春日即事􅀉主人尚書二首身比秋荷覺漸枯致君經國墮前圖層氷照日猶能暖病骨逄春却未蘇鏡裏白鬚撏又長枝頭黃鳥靜還呼􅁃樓恩化通神聖何計教招擲得盧又風拍衰肌乆未蠲破􅆤頻見月團圓更無舊日同人問只有多情太守憐臘内送將三折股􅀊隂分與五銖錢􅀇穹若假年齡在願捧銅盤爲國賢􅀉華山司空侍􅀰三首金闕爭權競獻功獨逃徴詔卧三峯雞群未必容於鶴蛛網何由捕得龍清論盡應書國史靜籌皆可息􅁁烽風霜落滿千林木不近青青㵎底松又非雲非鶴不從容誰敢輕量傲世蹤紫殿幾徴王佐業青山未拆詔書封閑吟每待秋空月早起長先野寺鐘前古􅀒才多爲國滿懷經濟欲何從又仙掌林中第一人鶴書時或問眠雲莫言踈野全無事明月清風肯放君􅀉盧端公同年仁烱時遷都洛陽新立㓜主上陽宫闕翠華歸百辟傷心序漢儀崑嶽有炎瓊玉碎洛川無竹鳯凰飢須簮白筆匡明主莫許黃瓢博少師惆悵宸居逺於日長吁空摘鬂􅁁絲􅀉天台陳希畋隂山氷凍嘗迎夏蟄户雲雷只待春吕望豈嫌垂釣老西施不恨浣紗貧坐爲羽獵車中相飛作君王掌上身拍手相思惟大􅀏我曹寧比等閑人􅀉兩浙羅書記進即堙沉退却升錢塘風月過金陵鴻才入貢無人喚白首從軍有詔徴博簿集成時輩罵讒書編就薄徒憎憐君道在名長在不到慈恩最上層邑宰相訪翼日有􅀉淵明深念郄詵貧踏破莓苔看甑塵碧沼共攀紅􅔽蓞金鞍不缷紫麒麟殘陽妬害催歸客薄酒甘嘗罰主人夜半夢醒追復想欲長攀接有何因白酒兩瓶送崔侍御雪化霜融好潑醅滿壺氷凍向春開求從白石洞中得擕向百花巖畔來幾夕露珠寒貝齒一泓銀水冷瓊盃湖邉送與崔夫子誰見稽山盡日頺依韻酬常循州早年花縣拜潘􅀰㝷忝飛鳴出桂堂日走登天長似箭人同紅􅀣豈經霜帆分南浦知離别駕在東州更可傷公論一麾將塞詔且隨徴令過瀟湘謝主人惠緑酒白魚早起鵲聲送喜頻白魚芳酒􅀉來珍馨香乍掲春風甕撥刺􅀄辭夜雨津樽濶最冝澄桂液網踈殊未損霜鱗不曽垂釣兼親醖堪愧金臺醉飽身蜀雖􅀝􅀜張敵萬夫豈勝恩信作良圖能均漢祚三分業不􅀒荆州六尺孤緑水有魚賢已得青桑如蓋瑞光等君王幸是中山後建國如何號蜀都魏伐罪書勲令不常爭教爲帝與爲王十年小怨誅桓邵一檄深讐怨孔璋在井蟄龍如屈伏食糟驕馬忽騰驤姦雄事過分明見英識空懷許子將呉一主參差六十年父兄猶慶授孫權不迎曹操真長策終謝張昭見碩賢建業龍盤雖可貴武昌魚味亦何偏秦嬴謾作東遊計紫氣黃旗豈偶然兩晋三世深謀啓帝基可憐孀婦與孤兒罪歸成濟皇天恨戈犯明君萬古悲巴蜀削平輕似帋勾呉吞却羙於多髙鼻能知數競向中原􅉫戰旗宋二首天爵將儋石論一身恭儉萬邦尊賭將金帶驚寰海留得耕衣誡子孫締搆不應饒漢祖姦雄何足數王敦草中求活非吾事豈啻橫身向廟門又百萬人甘一擲輸􅀇穹惟與道相符豈知紫殿新天子只是丹徒舊嗇夫五色龍章身早見六終鴻業數難逾三年未得分明夢却爲蘭陵啓覇圖陳三惑昏昏中紫宸萬機抛却醉臨春書中不禮隋文帝井底尚擕張貴嬪玉􅀣歌聲移入金陵天子化爲臣兵戈半渡前江水狎客猶聞爭酒廵讀史亞父凄凉别楚營天留三傑翼龍爭髙才無主不能用直道有時方始平喜愠子文何頴悟卷藏蘧瑗甚分明須知飲啄由天命休問黃河早晩清漢宫新􅃂位在嬪妃最上頭􅀏他長信女悲秋日中月滿可能乆花落色衰殊未憂公主鏡中爭翠羽君王袖底奪金鈎妾家兄弟知多少恰要同時拜列侯開元即事曲江真􅌠國忠訛㝷奏漁陽忽荷戈堂上有兵天不用幄中無策印空多楊國忠時兼諸使舘三十二印塵驚􅀐透潼􅀜鎻雲送龍遊錦水波未必蛾眉能破國千秋休恨馬嵬坡李翰林謫下三清列八仙􅀗調􅅅􅂦侍龍顔吟開􅃈闥窺天近醉卧金銮待詔閑舊􅀮不歸劉備國旅魂長􅀉謝公山遺編往􅂤應飛去散入祥雲瑞日閒聞長安庚子歳事羽檄交馳觸冕旒凾􅀜飛入兠鍪皇王去國未爲恨寰海失君方是憂五色火雲凝蜀郡幾般妖氣撲神州唐堯縱禪乾坤位不是重華莫謾求公子行十五轅門學控弦六街􅀐馬去如烟金多倍著牡丹價髪白未知章甫賢有耳不聞經國事拜官方買謝恩牋相如謾􅀃凌雲賦四壁何曽有一錢依韻贈嚴司直曾轉霜􅅾到玉京宣尼恩奏樂卿名歌殘白石扣牛角賦換黃金愛馬卿滄海二隅身漸老太行千叠路難行夫君才大官何小堪恨人閒事不平傷前翰林楊左丞飛上鰲頭侍玉皇三台遺耀換餘光人閒搦管窮蒼頡地上修文待卜商貞魄肯隨金石化真風留伴蕙蘭香皇天未啓昇平運不使伊臯相禹湯日月無情日月無情也有情朝升夕没照均平雖催前代英雄死還促後來賢聖生三尺靈烏金借耀一輪飛鏡水饒清慿誰築㫁東溟路龍影蟾光免運行新月雲際嬋娟出又藏羙人腸斷拜金方姮娥一隻眉先掃織女三分鏡未光珠箔􅀉鈎懸杳靄白龍遺爪印穹蒼更聞十五圓明夜與破隂霾照八荒和尚書詠烟無根無蒂結還融曾觸嵐光徹底空不散幾知離畢雨欲飛須待落花風玲瓏薄展蛟綃片羃歴輕含鳯竹叢瓊什捧來思舊隐撲􅆤穿户曉溟􅄥宫鶯領得春光在帝家早從深谷出烟霞閑棲仙禁日􅁁栁飢啄御園天上花睍睆只冝陪閣鳯閒􅀜多是問宫娃可憐鸚鵡矜言語長閉雕籠􅀊月賖䨇鷺䨇鷺雕籠昨夜開月明飛出立庭隈但教緑水池塘在自有碧天鴻雁來清韻叶霜歸島􅀣素翎遺雪落漁臺何人爲我追㝷得重勸溪翁酒一盃鷓鴣繡僕梅兼羽翼全楚鷄非瑞莫爭先啼歸明月落􅁁􅀣飛入百花深處烟避燒幾曽移逺岫引雛時見飲晴川荔枝􅀄熟無人際啄破紅苞墜野田釣磯文集卷第九
