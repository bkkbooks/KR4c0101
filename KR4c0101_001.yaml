  text: 唐秘書省正字先輩徐公釣磯文集卷第一
  hash: sha256:f07711d25f8ccefd9c8995f6d81762460161c7f59546171212332346cc7ba3f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_001-1a}
body:
  text: 徐夤昭夢著賦御溝水賦陸海之中昆明以東御爲溝而有自溝注水以無窮縈紫閣之千峯清辭玉洞㵼銀河之一泒冷入瑰宫我西都也地正三秦天連五緯不知此水之出但見斯溝之貴旣非减㶚以分滻又匪䟽涇而鑿渭是何飛下霓雲㳂髙走低潺湲乎玄豹里北繚繞乎靈龜岸西豈因水伯穿地維通來玉甃必是神龍爲天子吐灌金隄上遶蓬瀛中侔溟渤涵暮景於瓊殿倒晴光於絳闕色入天池逺不逺兩岸垂楊聲噎金屋眠不眠六宫明月逈寫岧嶤髙連碧霄朝宗而鳳沼將近習坎而龍宫不遥潄今古之雄都千門水鏡截東西之大道幾處虹橋豈不以决泄年長泉源地逺青蕪濯翠兮霄雨霽紅杏飄英兮春日晚堪歌聖代浮通其德澤恩波莫問當時流破其秦宫漢苑香徹天涯先來帝家重輪而瑞蘸紅日五色而光揺彩霞時時而翡翠隨波飛穿禁栁往往而鴛鴦逐浪􅔷出宫花其或赫日流金與人望歳或憂地利以將失願假天涯而下濟分紫禁以餘潤作黔黎之大惠則禹濬川也不爲己而爲人農擊壤焉不荷天而荷帝玉堂金殿兮知不知敢進蒭蕘於此際斬蛇劔賦磨霜礪雪兮熒煌錯落伊逐鹿之英聖兮有斬蛇之鋒鍔蓋以麾正乾坤劃分善惡楚國之姦雄徒爾烹若窮鱗常山之首尾胡爲斷如朽索斯劔也上應石臨舒陽慘隂有其道則威如身兮靈若心無其道則鉛其刄兮木其鐔惟上德之在火協紅爐之躍金莫不龍活三尺霆飛半㝷是何靈貺之異天啓之始而乃振戎衣受秋水匣辭乎豐沛之邑腰入乎崤凾之里日月方瞑雲雷未啓有大蟒以橫路礙濳龍之舉趾上較天意下量地紀視銛鋒而何斯違斯擊怪物而宛其死矣然後挫七雄削多壘豈惟仗之剪長蛇而戳封豕蓋將提之令諸侯而禪天子得非秦毒之奢化作長蛇漢德之儉化爲神劔奢以儉䧟蛇以劔斬道在晦而須顯事有增而必减果聞哭白帝之亡符赤帝之昌雖行大義亦􅖍雄鋩莫不龜文龍藻玉縷金裝世亂將用時清則藏十二年兮加我淬七十陣兮摧爾剛空山吞象之鱗豈鈋蓮鍔大澤􅔷珠之血不汚星光然後歴興亡經得䘮漢之滅兮魏之授魏之衰兮晋之仗晋大起兮髙飛豈混煙煤之狀勾踐進西施賦惑人之心兮惟巧惟僣破人之國兮以妖以艶當勾踐之宻謀進西施而果驗昔者二國相吞凌卑恃尊殊不知卑則自亡而固存尊則爲明而反昏鳥喙年年誓啄夫差之肉稽山日日拜聽范蠡之言言曰伍員之賢東吳之德伯嚭之佞東吳之賊德之盛兮越可憂賊之興兮吳可殛臣以夙夜而計機謀偶得欲狂敵國之君須中傾城之色待其聲色内伐君臣外惑自然紂妲己以亡宗晋􅌐姬而亂國今苧羅之山越水之彎恐是神仙之化忽生桃李之顔波淺丹臉鴉深緑鬟顰翠黛兮慘難效浣輕紗兮妖且閑楊栁羞弱芙蓉恥艶可以變栁惠於貞莊之際恱荆王於䰟夢之間臣請進焉王今何以王乃豁若而喜矍然而起曰此蓋神假卿之竒畫天雪越之前恥乃命寳馬騰龍香車輾風迎織女於銀漢聘姮娥於月宫炫燿雲外喧闐洞中粧成而瑞玉凝彩麗服而朝霞剪紅昨日猶賤今晨不同寜期大國之君流恩下及堪恨鄰家之婦謂妾長窮曉別越溪暮歸吳苑越慮計失吳嫌進晚歌一聲兮君魄醉笑百媚兮君心卷坐令佞口因珠翠以興言立遣謀臣棄洪濤而不返勾踐乃走電驅雷星馳箭催投醪而士卒皆醉甞膽而胷襟洞開虎噬骨碎山崩卵摧楚腰衛鬂化爲鬼龍樓鳳閣燒作灰於是命屠蘇之酒上姑蘇之臺伊覇業以俄去我英風而聿來於戲殺忠賢而受佳麗欲不敗而難哉人生幾何賦葉落辭柯人生幾何六國戰而謾爲流血三神山而杳隔鯨波任誇百斛明珠豈延遐筭或有一巵芳酒且共髙歌豈不以天地爲爐日星爲紀雖有聖以有智不無生而無死生即浮萍死爲流水七十戰爭如虎豹竟刎烏江三千賔客若鴛鴻難㝷珠履擾擾怱怱晨鷄暮鐘命難保兮霜與露年不禁兮椿與松問青天隂慘陽舒拘入否泰嘆白日東生西没奪我顔容可惜繁華堪驚倚伏有寒暑兮促君壽有鬼神兮妬君福不覺南陵公子緑鬂改而華髮生北里豪家昨日歌而今日哭夣幻吞侵朝浮夕沉三光有影遣誰繫萬事無根何處㝷易伏猛獸難降寸心眼看西晋之荆榛猶經白刄身屬北邙之狐兎尚惜黃金柰何荒色嗜音雕墻峻宇君不見息夫人兮悄長黙金谷園兮閴難香閤之羅紈未脫別已承恩春風之桃李方開早聞移主丘塜纍纍金章布衣白楊芳草正堪恨逐利爭名何太非甞聞蕭史王喬長生孰見任是三皇五帝不死何歸吾欲挹玄酒於東溟舉嘉肴於西岳命北帝以指榮辱召南華而講清濁飲大道以醉平生冀陶陶而反朴首陽山懷古賦首陽山兮非秀非隆因其賢而名髙碧空偶巖谷之逋客問夷齊之古風厚殷紂而薄宗周曷稱仁智棄三隅而執一向可謂昏蒙且紂以斮脛求歡剖心取樂空寰瀛不足以充其欲整竹帛不足以編其惡民驚而萬國崩離天怒而三光舛錯肉爲林也怪山嶽之非髙酒作池焉笑江湖之易涸姬乃畋於渭濵會於孟津左白旄而右黃鉞應乎天而順其人莫不洗塗炭於四海解仇讐於萬民著金縢者乃昆乃仲釣玉璜者恃衡秉鈞何不弔紂之不德慶周之有國而乃助於紂以申謙怨於周而不食鴻飛豹隱亡秦於濁浪之濵蟬腹龜腸化骨於孤峯之側逋客曰夷齊以讓國無爲求仁去䂓何歴數之不究曷興亡之不知非不知周之可輔紂之可墮所憂者乃萬紀千齡所救者非一朝一夕恐後代謂國之可犯謂君之可廹強者以之而起亂勇者以之而思逆所以激其時而抗其迹往者勗而來可懲義要行而身不惜余乃陟彼髙岡遐思眇光嶺上之松筠抱直丘中之黍稷非香未知靈氣何化身魂曷彰爲聖賢則孔子顔子作嘉瑞則麒麟鳳凰縱天柱折而地軸摧斯名不冺任月兎死而日烏銷厥德逾芳於戲鍾其濁則爲佞爲邪禀其清則爲英爲異垂名之士餓林藪飽食之人硋天地是冝徴繪事而寫髙山仰止先賢之志薦藺相如使秦賦報國憂君無非薦人嘉繆子之匡趙擢相如之使秦懷寳懷才不是迷邦之士有仁有勇可爲銜命之人昔者秦以輕諾連城僥求尺璧不從則吾國難保將與則荆山可惜亷將軍不能陳其畫馬服君不能獻其策君臣盡日空憂白璧之亡朝野何人可奉皇華之辱繆子曰下位推先相如是賢騏驥請試於長坂鸑鷟須觀於逺天欲將伊吕量力臯䕫比肩推心而皎鏡光動鼓舌而黃河浪懸禍乃爲福媸仍改妍必能挫西秦而不強不大亦能繼東趙於千年萬年王乃宣恩渥召英傑劔出匣而齊皇宿松陵空而蔑霜雪旣佩君命誓傾臣節智爲囊也克藏和氏之珍詞作鋒焉願刺秦王之血旣而西入君門將朝至尊受璧而但驕其色還城而頻啞其言藺氏乃詭譎反幣𥘉終抗論大國封疆旣君王之失信微臣投璧顧柱石以寜存然後見秦王雖暴不能肆吞噬之力趙寳雖來卒能歸邯鄲之國國賞其爵人欽其德獻空籠者固可抱蓋歌易水者誠宜處黙有墨客卿進言以明且人臣者直以諫主公以取名况先王賤珠玉寳忠貞是璧也合請投於泉而抵諸谷庶令趙不屈而秦不爭亦足以致其君於淳朴激其俗於亷平安得狥不是以爲是枉其行而與行大凡將有國以有家無玩竒而玩異豈不見匹夫以之而側足王者以之而䘮志余甞覽趙國史書竊笑相如之事毛遂請備行賦上客縱橫毛公不爭旣藏器以待用遵陳辭而請行幾載和光智刄之深機但秘一朝效勇嚢錐之奥義斯明當其乆陟朱門長謙末德昆吾韜切玉之鋒丹丹穴戢凌雲之翼懷材抱器何趙國之足匡日往月來笑平原之未識俄而羽檄交催秦兵四來邂逅而君臣就辱逡廵而家國傾頺平原乃入楚求救招賢共裁列簮纓而議也簡文武以行哉恨同心而同德求其濫者何貴耳而賤目棄我全才於是奮發雄辭激求大志今行侣以將闕輙愚夫而敢備常時維縶驣驤之歩誰知今日彌縫頴脫之鋒可試然後得繼英豪彌輕爾曹瞻鄢郢以神勵出邯鄲而器髙明明特立之試斯期必克蠢蠢同行之輩應爲徒勞及其見楚國之君說秦兵之孽自旭旦以將論至日中而未决遂乃足玉砌以心動手霜戈而氣折倘一夫之有惜不肯扶危則五歩之非遥立當汙血故得楚國君臣來言盡遵師旅大加於東趙干戈日却於西秦名遂功成辱殺三千之客解紛排難慙生十九之人則知士也者不可以貧欺馬也者不可以瘦失何待客以無鑒幾遺賢於此日伊毛生也重於九鼎之功非狗盗雞鳴之匹玄宗御製盧徴君草堂銘賦玄宗以澤浸乾坤惟賢是尊仰盧氏兮晦天爵錫草堂兮抱節貞如何旣不臣於天子勒銘那借爰特降於王言微君以挺操凌霜維松隱碧弔夷齊爲犯上之士怪園綺爲沽名之客莫不洞壑窓楹雲霞簟席去隨麋鹿難留傅說鹽梅居陋茅茨因錫般垂匠石豹霧鴻冥名髙漢青一千年聖賜梁棟三十六峯擎户庭金馬石衢憶神仙之降此蓬扉甕牖假綸綍曰龍得水兮躍天威雲得風兮出巖洞雲龍兮有時興英賢兮違我夢草堂兮超垢氛椅桐兮老鸞鳳泉之深兮珠珍石之韜兮玉貞彼無脛而猶至此有德以難親草堂兮隔烟水郊陳兮布麒麟御筆揮雲玄文粲錦玉刋乎帝寵天語迹逸乎雞晏寢况乎沙室當檻緱山倒枕有月而簫吹碧洞野鶴同吟無人而澗鏁流泉野猿同飲色燿琳琅烟凝御香浮丘而録載金籍子晋而歌聞玉皇塗山之幣帛駢羅誰朝夏禹箕嶺之雲瓢寂寞敢讓陶唐是何暗室卑棲明廷延佇蓋由抱其才而冨以德所以鏤君恩而銘帝語則知道不逺人可以誠而内處陳後主獻詩賦國碎金陵寰瀛鼎新非翰墨不能贊洪業非詞章無以通紫宸億兆服歸被戎衣而創業華夷共指天下以爲臣後主以不惜邦家但荒淫之醜不建道德何歴數之有只貪翠閣留客金壺勸酒寜知其國換宗祧不覺其身離璽綬秦嬰有志能繫組於沛公孫浩無歸喜朝天於晋后旣而目注君門心期渥恩體國風而發詠念王澤以興言麗句今晨翻祝千年之聖丹墀昨日猶居萬乘之尊莫不技詠巢南星隨拱北吟搜而律吕相應墨探而珠璣盡得二儀形内徴日月之光天萬物毫端述山河而壯國豈是迹辱才髙心傷思勞周文羑里以窮易屈氏瀟湘而賦騷荒唐之夢將醒才人不見唱和之非以悟狎客何逃然後冩入瓊編神趍丹陛鵷行驚懷寳之屈鳳扆嘆縁情之麗太甲改三年之過恨不同時陳思驚七歩之才嫌當異世且夫心爲志言爲詩志也者可以冩於今而論於古詩也者可以刺於上而諷於時明不爲舜禹禪而聖晋魏強而欺豈徒詠風雲草木狥榮辱興衰家國何之却有登封之議祖宗誰嗣更無恓惋之詞只聞五字時吟千鍾日醉燕巢堪慓於帷幙鳥觜先呈於䜟記逡廵煬帝殞江都不及陳宫之故事鮫人室賦斯室誰見伊人盡傳浩渺而洪波有象深沉而碧浪無邉寳柱文軒恍朣朦而曜日前扄後闥通皎皛以澄天異彼鮫人處乎鯨海將洪堂之麗不逐桑田之改儲晶蓄素刮銀兎之秋光矗浪凝波刷金烏之晝彩露洗霜融涵虚湛空鑿户牖以非匹飾椒蘭而不同度木何人範環堵於琉璃地上作嬪誰氏織輕綃於玳瑁窓中鬼瞰終無神功自偶公輸之運斧難造辛紂之瓊宫何有䨇標百尺岧嶤而貝闕凌前萬户千門洞達而龍宫在後醒魄凄肌通玄創竒光攅而琥珀千樹花折而珊瑚萬枝控巨鯉之真人方能到此泛靈槎之上客莫入於斯電落窮隂雲閑大厦誰爲欺暗之士盡是泣珠之音霏霏瑞彩凝成蝃蝀之梁漠漠飛烟化作鴛鴦之瓦鏡瀉奫淪波澄垢氛瓊窓而鰲頂均岫綺棟而壺中借雲二十四里之漢宫何曾足數三十六般之仙洞未得相聞則知神化䂓模天然異質熒煌但想生白剞劂難明其揆日吾欲亁北海而涸南溟探􅌐龍於此室釣磯文集卷第一釣磯文集補賦據全唐文補均田賦嗟阡陌之開兮肆兼并之不仁古制不可以卒復兮迺議田之是均鬱林林之黎元兮資稼穡以為生既敎養之無法兮宜貧富之不平繄口分而畫野兮允經國之大式必邑地之相參兮限田萊而有極土不遺利兮人無闕力派頃田於單陋兮制强宗之侵陵獲資生之大利兮免豪右之倍徵此均田之大畧兮見寫圖之詳悉將損多而益寡兮齊民之歸一相爾疇之紛紛兮畝為數其秩秩露田之四十兮配桑田之二十定盈縮於還與受兮各分牛以自給强不敢於占奪兮弱猶得以播殖圖雖卷之不盈兮備輿地之所有桀良策於指掌兮念生靈其獨厚懿元魏之文辟兮獨有志於古制也苓用夏以變易兮昭大和之康乂也唐有臣曰元稹兮圖均田於德宗幸皇覽之見收兮路逶迆而不通迄柴周之顯德兮迺留心於務農頒稹圖於諸鎮兮均境内之租庸雖不能伯仲於魏之君兮亦拔萃於五季也視貞元之聚歛兮誠何足與議也慨圗遠而名存兮異索駿之丹青儻按圖以取則兮吾固知其有誠伊李泌之震書兮與斯圖其表震當中和而進獻兮務本之深意彼輿地非元圖兮徒經營乎版籍豳風之亦有圗兮欲勤勞夫稼穡豈若名田之與限兮猶總總其可行也實醕儒之良計兮均井田之一平也亂曰均田有圗稹所作兮厥制初行魏之度兮桑井既復孰諗其故兮索空圖於實効兮庻幾太平之助兮衡賦以儀止泰一無淺觀業為韻捜聖人之垂象伊兹衡之可觀材徑挺以繩直星連綿而珠攢椎用也甿庻不能以多少隱惟平也輕重不能以詐偽干故得萬人便於㕓里物或紛競可以定黍累之圭撮利其分毫可以觀低昂之容止執中以告無或不喜則夫衡之為物其用甚大四方正而域中平七政齊而天下泰動而無欲任之故絶私益而無方行之固不害然能思無不踐應倉舒刻舟之深淺問無不知表張重度骨之威儀若乃均其神道形其事業聖人因之以平施邊鄙賴之而不怯豈欲決其差謬明其有無小人取之以作則君子見之而交孚則有王臣謇謇宰職秩秩洞鑒人才神無隱質諒兹衡之攸媲故守之而勿失倘陳平之見知宰州縣之如一詩據唐音癸籖全唐詩補蝴蝶栩祤無因繫得他野園荒徑一何多不聞絲竹誰教舞應仗流鶯為唱歌初夏戯題長養薫風拂曉吹漸開荷芰落薔薇青蟲也學莊周夢化作南園蛺蝶飛春入鯉湖到來峭壁白雲齊載酒春遊渡九溪鐵嶂有樓霾欲墮石門無鎖路還迷湖頭鯉去轟雷在樹杪猨啼落日低囘首浮生真幻夢何如斯地傍幽棲徐正字譔述見扵崇文總目者賦五卷探龍集一卷今皆不傳此釣磯集十卷乃其後人可珎所編可珍未詳何時人其序稱延祐丁酉似是元時然延祐實無丁酉歳疑傳寫误尔正字名它書多作寅此獨作夤未详其審唐人集傳扵今者尟矣此確闕其第五卷校之它本作二卷者為善壬子十月從蕘圃孝应假讀因記扵卷尾竹汀居士錢大昕
