front:
  text: 唐祕書省正字先輩徐公釣磯文集卷第七
  hash: sha256:0677708d03681e5508d1c19fa4b4f08349fb5538913e2e06963f275a38cebe33
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_007-1a}
body:
  text: 徐夤昭夢著詩七言律詩五十二首華清宫十二瓊樓鎖翠微暮霞遺却六銖衣桐枯丹穴鳯何去天在鼎湖龍不歸簾影罷添新翡翠露華猶濕舊珠璣君王魂斷且向蓬瀛伴貴妃再幸華清宫腸斷將軍改葬歸錦囊香在憶當時年來却恨相思樹春至不生連理枝雪女冢頭瑶草合貴妃池裏玉蓮衰霓裳舊曲飛霜殿夢破魂驚絶後期鬢髮鬢添華髮數莖新羅雀門前絶故人减食為緣踈五味不眠非是守庚申深園竹緑齊抽笋古木蛇青白脫鱗天地有爐長鑄物濁遺塊待陶鈞喜雨上主人尚書天皇攘袂救神龍雨我公田兆歲豐幾日淋漓侵暮角數宵滂沛徹晨鐘細如春霧籠平野猛似秋風擊古松門下十年耕稼者坐來偏憶翠微峯廽文詩二首飛書一幅錦紋回恨寫深情寄雁來機上月殘香閣掩霏霏雨罷歌終曲漠漠雲深滿酒杯歸日幾人行問卜徽音想望倚髙臺又輕航數點千峯碧水接雲山四望遙晴日海霞紅靄靄曉天江樹緑迢迢清波石眼泉當檻小徑松門寺對橋明月釣舟漁浦逺傾山雪浪暗隨潮不把漁竿不把漁竿不灌園策笻吟繞緑蕪村得爭野老眠雲樂倍感閩王與善恩鳥趂竹風穿靜户魚吹烟浪噴晴軒何人買我安貧趣百萬黃金未可論古往今來古往今來恨莫窮不如沉醉卧春風雀兒無角長穿屋鸚鵡能言却入籠栁惠豈嫌居下位朱雲直去指三公間思郭令長安宅草沒匡墻舊事空十里煙籠十里烟籠一徑分故人迢遞久離群白雲明月皆由我碧水青山忽贈君浮世宦名渾似夢半生勤苦謾為文北邙坡上青松下盡是鏘金佩玉墳偶書巧者多為拙者資良籌第一在乘時市門逐利終身飽谷口躬耕盡日飢瓊玖鬻來中燕石蓬蒿芳處楚蘭衰髙皇冷笑重瞳客蓋世拔山何所為潤屋潤屋豐家莫妄求眼看多是與身讐百禽羅得皆黃口四皓山居始白頭玉爍火光爭肯變草芳﨑岸不曽秋朱門粉署何由到空寄新詩謝列侯退居鶴性松心合在山五侯門館怯趨旋三年卧病不能免一日受恩方得還明月送人松驛路白雲隨馬入柴關笑他范蠡貪婪甚相罷金多始退間間門閉却間門卧小窗更何人與療膏盲一生有酒唯和醉四大無根可預量骨冷欲針先覺痛肉頑頓炙不成瘡漳濵伏枕文園渴盜跖蹤橫似虎狼開窗閉户開窗寢又興三更時節也如氷長間便是忘機者不出真如過夏僧環堵豈慚蝸作舍布衣寧假鶴為翎薔薇花盡薰風起緑葉空隨滿架藤燈花黠蠟燒銀却勝栽九華紅艷吐玫瑰獨含冬夜寒光折不傍春風暖處開難見只因能送喜莫挑唯恐墜成灰貪膏附熱多相誤為報飛蛾罷拂來東歸出城留别知己常蒙屈指許非才三載長安共酒杯欲别未攀楊栁贈相留擬待牡丹開寒隨御水波光散暖逐衡陽雁影來他日因書問衰颯東溪須訪子陵臺詠懷愁花變出白髭鬚半世辛勤一事無道在或期君夢想貧來爭奈鬼椰榆馬卿自愧長嬰疾顔子誰憐不是愚借取秦宫臺上鏡為時開照漢妖狐郊村獨遊歲閏憐曆候遲出門惟與野雲期驚魚擲上緑荷芰棲鳥啄餘紅荔枝未路可能長薄命修途應合有良時市頭相者休相戲蹙膝先生半自知經故翰林楊左丞池亭入角紅亭䕃緑池一朝青草蓋遺基薔薇藤老開花淺翡翠巢空落羽竒春榜幾升門下客樂章多取集中詩平生德義人閒頌身後何勞更立碑經故廣平貟外舊宅門巷蕭條引涕洟遺孤三歲著麻衣緑楊樹老垂絲短翠竹林荒著笋稀杜結僧因秋朔弔買書船近葬時歸平生欲獻匡君策抱病猶言未息機潘丞相舊宅緑樹垂枝䕃四鄰春風還是舊時春年年燕是雕梁主處處花隨落月塵七貴竟為長逝客五侯尋作不歸人秋槐影薄蟬聲盡休謂龍門待化鱗門外間田數畝長有泉源因築直堤分為兩沼左右登漪小檻前直堤髙築古平川十分春水雙簷影一片秋空兩月圎前岸好山搖細浪夾門嘉樹合晴烟坐來暗起江湖思速問溪翁買釣船北園北園乾葉旋空枝蘭蕙還將衆草衰籠鳥上天猶有待病龍興雨豈無期身間不猒頻來客年老偏憐最小兒生事罷求名與利一窗書䇿是年支溪上要一隻白簟扇蓋頭垂釣去年就節推侍御請之蒙惠一柄紫花紋者雖則鱗華具甚紕薄不及清源所出因就南郡陳常侍請之遂成拙句難求珍箑過炎天逺就金貂乞月圎直在引風欹角枕且圗遮日上魚船但令織取無花簟不用挑為飲露蟬莫道如今時較晚也應留得到明年招隱齒髮那能敵歲華早知休去避塵沙鬼神只闞髙明里倚伏不干棲隱家陶景豈全輕組綬留侯非獨愛烟霞贈君吉語堪銘座看取朝開暮落花憶山友憶得當年接善鄰苦將間事強夫君鬪開碧沼分明月各領青山占白雲近日藥方多繕寫舊來詩草半燒焚金門幾欲言西上惆悵關河正用軍溪隱將名將利已無緑深隱清溪擬學仙絶却腥羶勝服藥斷除杯酒合延年蝸牛殼陋寧同舍榆莢花開不是錢鸞鶴久從籠檻閉春風却放𥿄為鳶酒醒酒醒欲得適間情騎馬那勝䇿杖行天暖天寒三月暮溪南溪北兩村名沙澄淺水魚知釣花落平田鶴見耕望斷長安故交逺來書未說九河清夢斷夢斷紗窗半夜雷别君花落又花開漁陽路逺書難寄衡嶽山髙雁不來玄燕有情穿繡户靈龜無應祝金杯人生若得長相許螢火生烟草化灰人事人事飄如一炷烟且須求佛與求仙豐年甲子春無雨良夜庚申夏足眠顔氏豈嫌瓢裏飲孟光非取鏡中妍平生生計何為者三徑蒼苔十畝田休說休說人閒有陸沉一樽間待月明斟時來不怕滄溟濶道大却憂潢潦深白首釣魚應是分青雲干祿已無心梓桐賦罷相如隱誰為君前永夜吟嘉運嘉運良時兩阻修釣竿簔笠樂林丘家無寸白渾間事身似浮雲且自由庭際鳥啼花旋落潭心月在水空流晨炊一筯紅銀粒憶著長安索米秋緑鬢緑鬢先生自出林孟光同樂野雲深躬耕為食古人操非織不衣賢者心眼衆豈能分瑞璧舌多須信爍良金君看黃閣南遷客一過瀧州絶好音驕侈驕侈阽危儉素牢鏡中形影豈能逃石家恃冨身還滅顔子非貧道不遭蝙蝠亦能知日月鸞凰那肯啄腥臊古今人事惟堪醉好脫霜裘換緑醪龍蟄龍蟄蛇蟠却待申和光何惜且同塵伍員豈是吹簫者冀缺非同執耒人神劔觸星當變化良金成器在陶鈞穰侯休忌關東客張祿先生竟相秦又休說雄才閒代生到頭難與運相爭時通有詔徴枚乘世亂無人薦禰衡逐日莫驚駑馬步司晨誰要牝雞鳴中林且作烟霞侣塵滿關河未可行逐臭蒼蠅逐臭蒼蠅豈有為清蟬吟露最髙竒多藏苟得何名冨飽食嗟來未勝飢窮寂不妨延壽考貪狂縱待算毫釐首陽山翠千年在好奠氷壺弔伯夷牡丹花看遍花無勝此花剪雲披雪蘸丹砂開當青律二三月破却長安千萬家天縱穠華刳鄙吝春教妖艷毒豪奢不隨韓令同時倍種霜松與辟邪又萬萬花中第一流淺霞輕染嫩銀甌能狂綺陌千金子也惑朱門萬户侯朝日照開携酒看暮風吹落繞欄收詩書滿架塵埃撲盡日無人略舉頭尚書座上賦牡丹花得輕字韻其花自越中移植流蘇凝作瑞華精仙閣開時麗日晴霜月冷銷銀燭熖寶甌圓印綵雲英嬌含嫩臉春粧薄紅蘸香綃艷色輕早晚有人天上去寄他將贈董雙成依韵和尚書再贈牡丹花爛銀基地薄紅粧羞殺千花百卉芳紫陌昔曾遊寺看朱門今再繞欄相龍分夜雨資驕態天與春風發好香多著黃金何處買輕橈挑過鏡湖光郡庭惜牡丹腸斷東風落牡丹為祥為瑞久留難青春不駐堪垂淚紅艷已空猶倚欄積蘚下銷香蘂盡晴陽髙照露華乾明年萬葉千枝長倍芳菲借客看追和白舍人詠白牡丹蓓蕾抽開素練􅌩瓊葩薰出白龍香裁分楚女朝雲片剪破姮娥夜月光雪句豈須徴栁絮粉腮應恨帖梅粧檻邊幾笑東籬菊冷折金風待降霜憶牡丹緑樹多和雪霰栽長安一别十年來王侯買得價偏重桃李落殘花始開宋玉鄰邊腮正嫩文君機上錦𥘉裁滄洲春暮空腸斷盡看猶將勸酒杯惜牡丹今日狂風揭錦筵預愁吹落夕陽天間看紅艷只冝醉謾惜黃金豈是賢南國好偷誇粉黛漢宫冝摘贈神仙良時雖作鶯花主白馬王孫恰少年覽栁渾汀洲採白蘋之什因成一章採盡汀蘋恨别離鴛鴦鸂鶒總雙飛月明南浦夢𥘉斷花落洞庭人未歸天逺有書隨驛使夜長無燭照寒機年來泣淚知多少重叠成㾗在繡衣司直巡官無諸移到玫瑰花芳菲移自越王臺最似薔薇好並栽穠艷盡憐勝綵繪嘉名誰贈作玫瑰春藏錦繡風吹折天染瓊瑶日照開為報朱衣早邀客莫教零落委蒼苔梅花瓊瑶𥘉綻嶺頭葩蕊粉新粧姹女家舉世更誰憐潔白癡心皆盡愛繁華玄冥借與三冬景謝氏輸他六出花結實和羔知有日肯隨羌笛落天涯荔枝朱彈星丸粲日光緑瓊枝散小香􅌩龍綃殼綻紅紋粟魚目珠涵白膜漿梅熟已過南嶺雨橘酸空待洞庭霜蠻山踏曉和烟摘拜捧金盤獻越王又日日薰風卷瘴烟南園珍果荔枝先靈鴉啄破瓊津滴寶器盛來蚌腹圓錦里只聞銷醉渴蕊宫惟合贈神仙何人刺出猩猩血深染羅紋遍殼鮮菊花桓景登髙事可尋黃花開處緑畦深消災辟惡君須採冷露寒霜我自禁物早榮還早謝澗松同德復同心陶公豈是居貧者剩有東籬萬朵金畫松澗底隂森驗筆精筆間開展覺神清曾當月照還無影若許風吹合有聲枝偃只應玄鶴識根深冝與茯苓生天台道士頻來見說似株株倚赤城釣磯文集卷第七
