front:
  text: 唐祕書省正字先輩徐公釣磯文集卷第五
  hash: sha256:bf4b6822e84b33749c1d8b9acf1c385b890109b7104c1ea2302618c2209935ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_005-1a}
body:
  text: 徐夤昭夢著賦過驪山賦以陵榷國殁永紀窮塵為韻六國血於秦秦皇還化塵塵驚而為楚為漢路在而今人古人但見愁雲黯慘曡嶂嶙峋時遷而金石非固地改而荆榛旋新愚聞周衰則避債登臺秦暴則焚書建國貴螻蟻於人命法豺狼於帝德兩曜昏翳九圍傾側扶桑幾里我鞭石以期通溟海幾重我驅山而要塞慘慘元穹嗷嗷七雄三農百穀以休務淬鐵磨金而獻功九州病萬室空韓趙魏以交滅楚燕齊而坐窮家有子兮誰得孝國有臣兮孰效忠九野分將焉作兆民之主諸侯吞盡方行天子之風星隕九霄城長萬里血染草木肉肥蛇豕將欲手挂天刃足挑地紀拙虞舜而短唐堯污殷辛而長夏癸禍從殃催川搖嶽摧金陵之王氣頓起蓬島之宮娥不來黔首求主蒼昊降災天漢之龍髯倏斷沙邱之鮑臭誰猜魑魅諸夏腥羶九垓於是宅彼岡巒兆斯陵闕猶驅六宮以殉葬豈言蔓草之縈骨嫌示儉於當時更窮奢於既殁融銀液雪疏下地之江河帖玉懸珠皎窮泉之日月嶫嶫層層不騫不崩斯高之喉舌方滑劉項之雲雷忽興軹道一朝璽獻漢家之主驪山三月火燒秦帝之陵今則草接平原烟蒙翠嶺想秦史以神竦弔秦陵而恨永華清宮觀鎖雲霓作皇唐之勝景樊噲入鴻門賦沛中之智兮勇鵬翻舞陽侯兮威曷論冒死而嘗輕白刃匡君而直入鴻門巵酒彘肩豈讓匹夫之膳朱輪畫轂能扶萬乘之尊當其秦鹿無主項王赫怒誇楚將於秋鷹滅沛公於蹇兔天地何少風雲可步海蕩山振龍驚虎懼鳳曆誰傳鴻門晝關湯池命酒歐劍搖環氣隆準以斯挫血重瞳而欲殷鯢浪鯨波呀呷於斯須之際禽籠獸穽炮燔於咫尺之閒洶洶羣心雄雄壯士詣閶闔而飛步怒豺狼而切齒僕視閽守掌窺戎壘嵩衡蓋數撮之塵溟海乃一泓之水身輕白羽蹈烈火以非難手擘朱扉信春冰之可履走電呀雷金樞洞開麋鹿奔而貙虎至燕雀驚而鷹隼來愚山可徙藺柱須摧引龍躍於洪波豢人徒爾送鴻翻於碧落弋者何哉下闕漢武帝求仙賦闕隱居以求其志賦以得志明時賢人野悅為韻小人之見兮見以求利大人之隱兮隱以求志索其居而弃世捐俗達其義而伺時藏器莫不濯足溪影掛冠山翠不游徑而得康莊不出户而窮天地上自英君傍為哲人偕侔鳳而藏羽盡規龍以蟄鱗恭聞舜雷澤而遁跡漢芒碭以潛身板築胥靡熊羆渭濱芝歌商嶺以誰聽瓢掛箕山而曷鄰雷澤之志兮志於聖也芒碭之志兮志於天下得之則宅乎寰海求之必通乎巖野所以賓四門而總百揆揖遜皇王斬白帝而烹楚君巍巍宋社渭濱之志兮國傅王師胥靡之志兮匡君佐時然後神契畋獵天開夢思三十八代之承祧韜鈐自有五十六年之救旱霖雨常滋商嶺之志兮以全真箕山之志兮於髙節逃秦輔漢以無失友帝朋巢而自悅蓋聞析心以智光乎聖哲志也者寂與心通隱也者憑乎志成并於心兮故可以通造化貫幽明成於隱兮或可君兆庶爵公卿志不立兮吾息則隱志茍通兮吾道斯行君不見西棘乘風上擊雲霓之路蟠泥得水高驤天漢之程奔塵競路以彌惑絶跡深扄而有得惑之者惑於澆濁得之者得於幽默虱捫西華以持衡龍卧南陽而輔國珞珞雲林之士方器巖廊攸攸市井之徒誰懷道德亦由擇梁棟於闕一字山索珠璣而在淵採緑蕙於樊圃刈嘉禾於於甫田其道要其理元嘗聞降蒲輪於草澤天子求賢山暝孤猿吟賦以吟起殘暉客顔悄惻為韻白日光沈青山影深伊萬籟以俱寂有孤猿而忽吟隔樹初傳切切而來當暮景隨風更遠聲聲而飛下煙岑當其曡嶂凌空微陽送晷擁條之響俄發命侶之音回起揚清引濁如含莊舄之愁吐怨流哀不為養由之矢增悵望兮動辛酸建陽小兮凝晚寒踰絶壑兮度鳴湍悲風颯兮零雨殘澗草凄緑溪花隕丹此處則臨岸爰笑攀蘿永嘆幾多之去棹來舟驚迷島嶼無限之離魂别緒飛掛林巒感東西而怨行役三峽山光峭空碧冒懸流而躋絶壁苦露結兮寒烟白望帝冤魂萇宏悵魄此處則抱樹驚曉號風向夕峨嵋高兮劍峰緑愁殺巴人錦江暮兮笻竹秋悲纒楚客山隱隱水渺渺孤猿吟兮何悄悄野駭麋鹿林棲羣鳥往往於松蘿谷口嘯得煙昏時時向薜荔峰前啼摧月皎斷續相催聲長韻微千林之紅葉雖墮萬里之愁雲不飛嘹嘹噭噭休未休如迎靜夜厯厯啾啾起又起似送殘暉足令掩耳傍偟吞聲太息何彼韻之增起欲我聽之暫息則知邊城雁兮高柳蟬未若聽吟猿而慘惻白衣入翰林賦以玉闕承恩速臣名德為韻天寶詞人李謫仙兮誰能論出白屋而謁明主脫布衣而為侍臣誰誇其麗藻清辭將承寵渥不待乎腰金拖紫便掌絲綸則知人不英無以動乎邦國主不聖無以振乎儒墨二美相契千齡所刻愚聞白之始也宅岷峩鎖羽翼待風雲伸道德金門玉殿兮掛雲夢乾象坤儀兮羅胸臆雲情鶴態歌劍嶺之秋光月夜煙朝釣錦江之春色俄而入洛遊京懷珠袖瓊塵中獨步酒肆陶情烏棲曲兮金石奏蜀道難兮神鬼驚小隱乎林壑大隱乎帝城賀祕監兮薦英秀韓荆州兮誇盛名於是鳳詔搜揚洪名振發長裾似雪兮出圭竇縫掖如霜兮入禁闕冰姿玉貌别巢許之林巒醉眼慵心豁唐虞之日月走騎飛軒街談巷言青雲得路兮肌骨換白日升天兮朝市喧縞素麻衣朝雜庶人之伍龍攄虎變夕蒙天子之恩彩筆摛文彤庭步玉碧山之傲逸猶在紫禁之繁華乍束往往而紅筵對酒宦者傳觴時時而後殿操麻宮娥捧燭夫如是則才德須憑簪纓自勝起布素之卑位陟蓬瀛之上層白鳳辭高青帝之春華不若金鸞寵異皇王之密旨先承豈不以天假良時神資景福草元之客兮進何晚題柱之人兮望何速曷若我不忮不求脫布衣而食天祿星賦闕雷發聲賦以起龍驚蟄天道式空為韻化不可識春之倏生神不可測雷之忽鳴表隂陽之大信發天地之希聲俄青律之未分寰區曷變俄洪音之一播品彙須驚豈不以上綰天樞下同地紀隂之變兮將伏陽之開兮欲起撾雲鼓雨殷南山而過北山火轂風輪震百里而越千里浩浩闃闐神驚魂顛冥濛而烏兔將墜動蕩而山河欲遷須臾走電赫飛霆聯霹靂俄奔八表謂衝開下土轟軿繼作九州疑裂破青天烈缺威催豐隆令急晴陽照兮凍冰洗甘澤滂兮衰朽濕幾處脅韶光淑氣振折羣芳數重呀地户坤維驚醒百蟄燭烻洪濛鼙掀碧空香籠麗景翠染東風去年之積冷凄寒皆令變暖昨日之枯株槁木盡使駢紅則知春之榮雷於春而禀德秋之落雷於秋而授職不然者何以動於此以為準止於彼而作式聲之發也星辰將厯候咸移聲既收焉蠢動與芳菲並息駕電驅風高凌九重日兮月兮還我化天兮雲兮塗我蹤時時而逺谷隂霾訇崩曡嶂往往而寒湫煙雨吼拔潛龍則知雷發無遺春光自早發聲而歲歲長在景光而人人自老不能火僭逆而霹姦妖攸攸兮天道寒賦以色悴顔愁臣同役也為韻壬子歲大雪濛濛繁雲鎖空白日光沒樵溪脈窮地洞沍而履不得天颼飀而飛不通庭蘭落翠禁樹摧紅安處王乃去廣殿即深宮獸炭呀焰狐裘禦風頻謂左右曰寡人今日之寒斯甚曷與下民而同憑虛侯進言曰大王自恐嚴凝罔憂邦國下民將欲凍死大王未有寒色王曰下民之理聞之可得對曰只如負禦三邊彌年不還戍遠燕嶺衣單雁山鐵甲兵徹金刀血殷風刮衰力砂昏少顏大軍之生死頻決上國之英豪甚間今則凍平遼水雪滿蕭關此戰士之寒也王曷知其險艱至若荷鍤田里勞乎農事草荒而耒耜無力地冷而身心將悴賦役斯迫鋤耰何利凍體斯露疏蓑莫庇東皋孰閔其耕耘北闕但爭其祿位今則元律將結元冬已繼此農者之寒焉王曷知其憂愧復有萬里辭親求名進身韜玉待價燃金食貧賀清平於四塞冒霜霰於三秦北户無席冬衣有鶉幸偶乎勛華為主同思乎伊呂稱臣今則顓頊威至元冥令臻此儒者之寒焉王曷知其苦辛别有苦寒之者不能殫寫在臣說矣恐王煩也於時陽氣收隂氣浮火井滅朔風愁千山之凍樹頻折八水之凝波不流王乃閔征戰之勞命偃乎兵革念耕之苦命蠲乎徭役知儒者之寒命選於宗伯伍員知姑蘇臺有遊鹿賦闕釣磯文集卷第五
