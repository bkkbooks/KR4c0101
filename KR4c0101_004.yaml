front:
  text: 唐秘書省正字先輩徐公釣磯文集卷第四
  hash: sha256:1f4fec90b0dd51d9ad01ffaebb1daf6ad36bd551339e4b451c60bd8882120d53
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_004-1a}
body:
  text: 徐夤昭夢著賦止戈爲武賦書契天設文明日新將究止戈之義式彰爲武之仁足還太素以壽生靈志肅三軍欲至理而生乎至理論歸八法見古人兮教以今人昔者楚莊薄諸晉國小臣請築於京觀厥王乃陳乎道德謂臨戎制勝誠不在乎干戈示子傳孫事冝規於翰墨且武也者戰而不陣師克在和考其字以因明所字止其戈而焉用其戈願劍㦸而棄於農耕賢哉若彼問軍旅而對以爼豆聖也如何矧乎伏羲畫卦以窮微蒼頡造書而允中於會意以無怠實臨文而可諷下破山而加點理絶乗危上擬戍以無人誠難動衆以五兵爲武者非武之資合兩字爲武者是武之竒當用究言而不用有爲詎及於無爲鳥跡斯驗人情可窺亦由月並日而明焉其儀不昧秋懸心而愁矣厥義咸知是冝遵史籕之文贊昇平之主兩階屢舞以稱聖七德交修而曰武亦何異威而不猛宥刑而擾寧施捨之而藏得象而筌蹄奚睹今我后洞窮經之㫖知爲君之難功不宰而八蠻自服書同文而萬國咸安列聖摧凶我則懷逺而柔邇前王伐罪我則去殺而勝殘故得文物重新妖氛自弭廬人之百鍊寧問吕望之六韜可委士有偶明試而賦止戈獲贊皇風而之垂衣裳而天下治賦大道純素明君御乾垂衣裳而教被率土冺智慮而恩覃普天端衮冕於九重威儀備矣走車書於萬國文軌同焉聖人以象合乾坤育涵臣子握金鏡而破昏黒啓瑶圗而昭福祉温恭允塞損耳目以無營拖黼垂旒致邦家而自理不出宸居濳孚聖謨虚已而應乎萬有㓕私而契彼三無引日月之長裾遐蘇品彚雍星辰之法服自化寰區於是負扆彤闈凝情寳位播亭毒以無黨表雍熈而自有山龍煥爛映黃屋於長舒風雨廽旋仰洪猷而克遂豈不以羲頊齊教臯䕫在官德所至兮天髙地厚信不愆兮春煦冬寒佩華藻以常閑九章惟麗傾空旻之所覆萬姓皆懽允紹二皇式孚九野尊以居上敦協和而在下飄紫宸而楚楚道泰生靈臨丹陛以襜襜塵清華夏赫赫巍巍功髙二儀法希微於視聽守玄黙於箴䂓自然淳朴將至生成罔虧茍人文之未化勞轍跡以何爲豈若黼黻光中德及於昆蟲草木圭章影裏澤流於地角天涯士有珪璧常輕光隂是重趨明代以求試望丹霄而翹踵君同軒后爲臣願讃於求衣才匪相如獻賦敢歌於垂拱入國知教賦天闢區宇人尊帝王國將入於封教先知於典章不宰成功乃合乾坤之德無私鑒物能齊日月之光昔仲尼制禮之則諭君之德爲萬乘之謨猷目六經之楷式將欲明其教必在遊於國温柔敦厚出風雅之詠歌比事屬辭本春秋之黜陟協彼典誥諧斯禮文廣博而樂章具有精微而易象爰分先王所以總斯御物體彼爲君遂使足歴四門親愛之儀已覩身由萬户民從之義皆聞莫不周鑒金湯濳量王覇冨樂和政以攸類陳詩觀風而相亞是以逄耕讓畔得先人後已之規察鳥安巢驗惡殺好生之化今吾君以興帝業赫皇明以謙柔而教蠻貊以朴素而教公卿以節儉而教百姓以農耕而教五兵自然八方走響六合飛聲豈俟入乎閫閾方能知彼規程其或䟦扈未殱陸梁未向可使拜天闕而俯德趨帝閽而引望俾其退而補過警干羽之舞階進以盡忠報聖明之在上士有負書劔出林巒謁九門而教化斯仰瞻百辟而威儀可觀則知不上泰山豈覺寰區之大不浮東流寧知溟渤之寛敢不廣義路擐忠甲開閶闔以聽聲詩賀仁沾而恩洽豐年爲上瑞賦聖祚開國文皇應天以豐登之有歳作祥瑞於當年重彼粢盛五稼而誠冝在上考諸圗牒四靈而莫待居先當其衆類呈祥明君建義將垂萬世之範逈出百王之智爲其三農百榖普爲四海之資鸑鷟騶虞空表一人之瑞於是别示休徴羲農教行調風雨則桑田自稔重龜鶴則倉廩寧盈我貴嘉禾朱草之庭前謾吐我滋甘澤慶雲之天際休呈四序和平三時播種蓋將何寳以爲寳不以無用而爲用且夫寒暑相從成歳順風如雲之稼穡千畆擊壤之歌聞四聰斯則家給人足時和歳豐縱鳯不止於髙梧之際麟不遊於靈囿之中又豈能損民力虧朕躬至如歴候不常隂陽反是甫田屢失於刈穫庶物不勝其殘毁菜色咸若豆分於此縱然出醴泉而浪湧波翻降甘露而珠英玉蘂然而不濟飢饉何足依倚豈若敬奉天時從其所冝升合頴秀岐之事冠素雀神烏之爲罹畢沾濡麗日之重輪在下如茨委積華芝與玉秀俱卑偉哉以年爲瑞者冨於玉靈以物爲瑞者詭於耳目欽哉以我后之玄德承太宗之景福士有觀大國之光輝敢謳謡於邦國福善則虚賦聖人曰天本無私福惟佑善曷云鑒之將昧考前言而盡鮮窮達而烏焉有命莫究慘舒吉凶而未必由人誰原昧顯善吾將議彼穹蒼其靈不常安得勇力者或昌進德者或亡忠讜者或罪謟佞者或彰孰云必有餘慶屢聞反受其殃且聞暴莫暴於殷紂虐無如於夏桀聖莫大於孔父智莫過於顔氏那令辛御極以爲君癸承祧而化民孔泣麟而嘆鳯顔命天而居貧亦何用仰日月祈鬼神胡不沈暴虚生聖智影響殃咎權衡嘉瑞移辛癸之位於孔顔之才賦孔顔之才於辛癸之位是何徒濶清明虚垂日星謂其覆而匪覆驗其靈而不靈在温良道德之家不鍾禄位於悖逆荒淫之室不震雷霆焉得盡立明誠不欺暗室非惟禄善以增膠復見禍滛而罔實君或驕而臣或叛自此而生子不孝而父不慈由斯而失嗟夫利害相磨殊非一科雖賢愚之異禀竟夭濁以同波然吾終身而積善不知天道以如何歌賦楚襄王魂𥘉驚髙堂賦成因命酒以將飲遂聽歌而適情於時白雪音厲陽春調清命宋玉之雄藻賦貫珠之妙聲玉乃避席而起請陳其志曰臣聞樂以象其聲歌以陳其事樂也者六律不得不正歌也者五音不得不備是故宫不亂而爲君商不亂而爲臣徴不亂而爲事角不亂以爲民羽不亂以爲物五音備以爲真如此則天地同和隂陽代順一謳而王道敦化再唱而民心端信逆氣亡象姦聲匿韻三光以照而不昧萬物以類而相振然後君臣序而父子親五音隆而四凟濬斯爲治世之音可同休於堯舜至如宫之亂兮君荒商之亂兮臣亡徴之亂兮事失角之亂兮民傷羽之亂兮物匱五音怪而改常如此則寒暑失時邦家自咎唱予而毒慘諸夏和汝則災生九有鬼神不享社稷非乆乾坤之紀綱濳紊麟鳯之禎祥莫偶然後孛彗皎而夷狄驕兵革飛而戎車走斯爲亡國之音可同風於桀紂其爲樂也不在玉管朱絃其爲歌也不在乎燕娥趙姬隔巴濮採聲詩樂府陶匏自本黃鐘之律姑蘇麋鹿誰聽白苧之辭王曰斯賦之盛珠輝玉映可以發昏蒙佐明聖爲前古之楷式作後來之龜鏡非寡人之所知敢不承天之命竹箆子賦東海生將治巾櫛貧無玩飾劈破烟筠刮殘霜色衰鬂攸利秋蓬自植乃有繡轂王孫光餘席門嘲謔斯玩薫蘭厥言曰先生不見南越之絶珍華閒發犀角磨水象齒披月皎君素手滑君緑髪朱邸豪商持金買將星流掌握雪瑩巾箱胡爲鬢枯澁㓕髪撩相東箭催勁緱笙罷吹薤園烟肥霜零葉萎銀床夕醉橫簟析澤比君之玩代君增愧惟大丈夫籝金斛珠雕瓊鏤璧錦蔕羅襦幽屑窮巷諭人壯圗東海生曰余居之窮也風號絶徼山枯鬼嘯黃雞唱午靈鴟末照槐棟蛇吟寒牀雨深跳跬媚竈舊井無禽又數之蹇也塞鴻漸陸金隄折軸玄蹄若神敏手如束青雀㳂流黃洿覆舟麏磨檻虎䑕嚼郊牛君門咫尺獻書山隔駑馬卧粟龍媒負軛綺語簧言爲犀爲璠衞退籧瑗堯遺八元天斗虚粟均人之禄隂尺神刀剪人之福余則朽枿陳蒵呼春不來塊消而土燼盡而灰焉能搜竒抉望爲玩爲好弓影攻疾菱花照老且聞箟櫛之功修諸禮容容之在肅禮之在恭容之不肅奚犀奚玉禮之若恭爲鳯爲龍又聞熒煌易㓕葱蒨易折知白守黒萬壽不絶旱禱滂沱祥雲若何飯待嘉谷靈芝孔多列國遺史恨四公子削玳爲簮編珠爲履冠劔魚鱗爭竒鬬珍寳肆開侈龍宫訴貧信陵能下止屠門者被褐則真狐裘則假田文二千禽蹄一馬權移勢改門羅雀懸平原十九毛生最後我有嘉賔莫孔之醜春申甚寛誰屠李園朱門故人何人死恩君子中庸奢亡儉存嘲我竹箟酬爾蒭言銘諸坐隅永貽後昆不言錢賦言者三端之本錢者百貨之源反其本以行已杜其源而不言如逄朽貫之資我辭遽嘿自負不貪之寳吾道常存昔王衍以東晋季年金陵薄俗恨朝野以爭競侈緍錢而縱欲化爲糞土填巨壑以難盈湧作波瀾灌漏巵而不足豈惟紫閣名臣紅窓羙女有私而盡以藏賄無德而何甞潤身夷甫乃怒於彼以心誓忿於時而氣振所以麈尾髙談肯說五銖之號鶴裘換酒同思四壁之貧泉貨寧懷樞機永秘何曽之十萬休述和嶠之癖多罷議賔階砌下誰云苔點之圓貨殖傳中諱却金錢之字衆多愛兮積聚奢淫我所愛兮惟財與金在乎心惡以言寢可以觀言而見心任同臭以驚時豈論崔烈任雨飛而滿屋靡說黃㝷且夫百萬奚若仁銷義鑠豈不見一惡而懼百非口非言而心嫉惡金相馬埒休詢王濟之爲山積鹿臺莫問殷辛之禍作蓋傷其濁世澆風貪婪莫充無茍禄者尤寡終不言而曷同斯時也道德雖盡銷刀削空斯人則與世垂範端身固窮手近青蚨先納青黃之口内眼觀榆莢預緘枝葉於胸中則知不立殊見寧議衆醜他拭目而余目彼钁金而此金口異哉不談人過不語亂神與斯人而善偶朱雲請斬馬劔賦朱公以紫殿之下明誠洞冩仗心劔而上請神劔非斬馬而不除害馬則知堂堂者多諤諤者寡是何抗萬乘而不慴覺千官而盡啞昔張禹以軒冕巍峩爲王者師攀龍附鳯於層漢隂慘陽舒於片辭不畏神怒惟專鬼隨中於人兮若酖若蠱漬於物兮如膏如脂合彈者誰是簮筆合諍者何人措詞雲則早奮忠貞誓摧邪曲有刄當斬對君必辱於時開九門兮左日右月朝百揆兮鏘金佩玉鴛鷺方駢雲龍乍矚於是演折角之雄辯趨逆鱗而上觸乃曰不諫非臣容奸匪君臣聞上有厥劔利無與羣不爭乎鍾切玉不並乎倚天决雲蓋是吹大宛之毛剸渥洼之骨君幸頒賜臣非僭越旣將伸明代之朝命㫁佞臣於大闕今太傅以傲抗三公昏蒙九重䧟君子於虬龍伏犬進小人則蛇虺成龍固請刑於廣肆血被銛鋒帝忽色怒雲乃氣衝死為屍諌生寕面從將軍匡闕以稽首天子逡巡而改容義匪伏蒲志大而諸侯瑣瑣芳流折檻名高而四海喁喁胡不淬辭為鋒礪志為刃拂訛濫以將退麾賢良而與進何必趨劍闕將求竟伊人而莫擯設若寳鍔將授昌言是嘉又何以見仲尼之紀綱誅正卯之姦邪則王莽之偷宗社又安得聞邪江令歸金陵賦陳祚以世六十年毒奢淫而忘險難運去而蠻奴北面時來而江總西還傷心而昨是今非三台祿位觸目而人非物在一片江山初其君但期天闕國無盤石詩成而詠雪嘲風酒惑而迷魂蕩魄昌言直諌朝朝而惟列七人列蠟燒蘭夜夜而長留十客一旦雷卷隋軍驚風坐聞龍顔入井以魚伏鳳閣離居而豆分於是嗟覆轍嘆浮雲抛建業之山河來朝魏闕捧金陵之日月送與隋文斯人以鳥戀南巢萍流遠道還吳而喜遂歸骨入境而鞠為茂草心感存沒淚横襟抱慘淡而煙迷遠渡杏浦波生蕭條而葉散悲風金檀樹老廢壘蕪城行行復行霜凌夜葉壯心碎屬國窮歸華髮生中臺將黄閣皆空荀池鳳去甲第與朱軒不見謝墅狐鳴茂苑濤聲秦淮月色終史溥之前夢嘆東昏之舊國雖信天命宜慙衮職豈不聞三秦甲馬已過乎淝水之陽二謝韜鈐克殄於夀山之北則知翌輔者在乎外撫四夷中扶萬機建其策而安邊卻敵致其君而端冕垂衣安得三閣天高但縱殷辛之酒萬兵雲集未知蘧瑗之非果令位失家亡君移國徙前恩不及於民庻晚歲卻還於舊里金陵旺氣索然空唯見碧闕二字涵淥水釣磯文集卷第四
