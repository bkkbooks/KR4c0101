front:
  text: 唐祕書省正字先輩徐公釣磯文集古序
  hash: sha256:c689cba8cb79b7c17af6e69c0e044024bedbf2d3192cfd4341d1c899bf080fd2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_000-1a}
body:
  text: 朝請郎編修道史檢察官兼次崇文總目管江州太平觀守祕書省著作佐郎賜紫魚袋族孫師仁撰正字諱夤字昭夢按五代史閩世家稱正字唐時以進士名依王審知仕宦九國志列傳正字莆田縣人乾寧𥘉舉進士禮部試止戈為武賦一燭才盡已就有破山加點擬戍無人之句侍郎李擇覽而竒之是歲釋褐祕書省正字歸寧於閩中屬江淮盜蜂起退居延壽溪王審知聞之辟居幕下而禮待簡略內不能平一旦拂衣去曰丈尺之水前陂後堰安能容萬斛之舟乎尋舊隱慨然有長往之志王廷彬刺泉州每同遊賞及陳郯倪曙等賦詩酣酒為樂凡十餘年求還所居嘗被病遣求藥物於廷彬答書曰善自調護亦可自開豁三皇五帝不死何歸蓋舉賦語以戲之竟卒於延壽之別墅本朝張丞相齊賢記正字未第時道汴州進謁梁祖面賦無雲雨篇立就其斷句云爭表梁王造化功大蒙賞遇及解褐東還祖為開宴醉中誤觸諱歸館了悟憂在不測復製遊大梁賦以獻其略曰客有得意還鄉遊於大梁遇郊坰之耆舊問今古之侯王父老曰且說當今休論前古昔時之功業誰見今日之聲名有覩中一聮云遂使千年漢將慿吉夢以神符一眼胡奴望英風而膽喪祖曾夢韓信授以兵法胡奴指李克用也祖讀至此大恱令軍士傳寫皆諷誦之敇字酬一縑不復責前事按崇文總目正字賦五卷探龍集一卷題曰僞唐徐某撰正字實未嘗仕僞唐也師仁家故有賦五卷探龍集五卷正字自序其後又於蔡君謨家得雅道機要一卷又訪於族人及好事者得五言詩并絶句合二百五十餘首以類相從為八卷并藏焉正字人生幾何賦至今膾炙人口兒童婦女往往道徐先輩而集有贈渤海髙元固詩序云髙見訪於閩中言本國得斬蛇賦御溝水賦人生幾何賦家家皆以金書列為屏障又自詠詩注云溫陵使宅有圗障二面張林西樓書手作廽文八體詩每一首顛倒讀成八首以此知正字之文不獨行於當時名於後世亦播於異域也然八體廽文詩尋討未獲小說載紅綾餅餤絶句亦不見全其餘碑碣之屬甚衆類皆亡失豈其賦名特髙故他文遂不俱傳歟今觀箋疏頗類玉溪而律詩精練亦不减同時韓致光吳子華諸人也惜乎遭罹亂世不獲少伸其志其來閩中且有前陂後堰之歎安有為朱溫所屈哉殆亦遜言避禍不得不爾也張丞相記頗詳足以附見建炎三年三月序唐祕書省正字先輩徐公釣磯文集文集者入莆第五代祖先輩公所撰文也公諱夤字昭夢登唐乾寧進士第試止戈為武賦魁天下授祕書省正字先輩時人推尊之稱也釣磯乃歸隱適意處號也豫嘗觀舊譜載十二代著作佐郎賜紫魚袋師仁公所著文集序云先輩公文字頗多家故有賦五卷探龍集五卷又於蔡君謨家得雅道機要一卷詩二百五十餘首蓋詳論之既有其序時必有集今皆亡失故常鬱鬱不樂凡對族人惟以不得其文為憂至延祐丁酉歲叔父司訓公於洛如金橋林必載家得詩二百六十餘首復於已亥歲族叔祖道真公遺賦四十篇不勝欣慰合而寶之後則屢求未能再得泊邇歲塵事稍息謹述世緒聲跡已詳於譜牒復讀威武軍殿中侍御史劉公山甫撰公墓志銘謂公所著詞賦感動鬼神搜括造化又謂悲泣百靈包羅萬象明珠無價至道不文窮達理性諷誡澆浮合先聖賢之意矣讀之至是愈有所感今則據其所得詩賦暫編成卷裝潢類諸譜諜合與族人暨諸君子共之可以知吾祖先手澤尚存而流衍無窮抑祝厥後子孫勉而求之以增是卷庶不負吾故家文獻之烜耀遂書之以為後之識也玩可珍謹識唐祕書省正字先輩徐公釣磯文集目録賦卷第一御溝水斬蛇劔勾踐進西施人生幾何首陽山懷古薦藺相如使秦毛遂請備行玄宗御製盧君微草堂銘陳後主獻詩鮫人室卷第二朱虛侯唱田歌外舉不避讐避世金馬門東陵侯弔蕭何貴以賤為本義漿得玉管仲棄酒扣寂寞以求其音知白守黑為天下式澗底松卷第三太極生二儀貟半千說三陳文王葬枯骨五王宅駕幸華清宫再幸華清宫卞莊子刺虎鑄百鍊鏡玄宗御注孝經割字刀子卷第四止戈為武垂衣裳而天下治入國知教豐年為上瑞福善則虛歌竹箆子不言錢朱雲請斬馬劍江令歸金陵卷第五過驪山樊噲入鴻門漢武帝求仙缺隱居以求志山暝孤猿吟白衣入翰林星缺雷乃發聲寒伍員知姑蘇臺有遊鹿缺詩卷第六長律八首依御史溫飛卿華清宫尚書命題瓦硯尚書㑹仙亭和尚書詠泉山瀑布自詠東風解凍和僕射二十四丈牡丹釣絲竹五言律詩二十一首旅次寓題釣臺贈嚴司直贈東方道士題僧壁和人經隋唐間戰處追和常建漢王昭君贈董先生河流題南寺北山秋晚昔遊酒胡子弔崔補闕弔赤水李先生香鴨雞白鴿龜銀結條冠子蜀葵七言絶詩二十八首鏡中覽懷楚國史張儀薔薇大夫松杏園蕉葉路旁草讀漢紀李夫人二首明妃馬嵬依韻贈南安方處士五首依韻答黃校書傷進士謝廷皓聞司空侍郎下世偶題二首猿追和賈浪仙古鏡蝴蝶二首新刺襪卷第七七言律詩五十二首華清宫再幸華清宫鬢髮喜雨上主人尚書廽文詩二首不把魚竿偶書潤屋退居間門開窗燈花東歸出城留別知己詠懷郊村獨遊經故翰林楊左丞池亭經故廣平員外舊宅潘丞相丞祐舊宅門外間田數畝北園溪上要一隻白簟扇招隱憶山友溪隱酒醒夢斷人事休說嘉運緑鬢驕侈龍蟄二首逐臭蒼蠅牡丹花二首尚書座上賦牡丹花依韻和尚書再贈牡丹花郡庭惜牡丹追和白舍人詠白牡丹憶牡丹惜牡丹覽栁渾汀洲採白頻之什司直巡官無諸移到玫瑰花梅花荔枝二首菊花畫松卷第八七言律詩五十二首草木松竹郡侯座上觀琉璃瓶中遊魚尚書打毬尚書惠臘面茶勸酒斷酒憶舊山西華嵐似屏風憶潼關憶潼關早行鴻門憶長安行憶長安上省年長安述懷長安即事三首東京次新安道中山隂故事溫陵即事溫陵殘臘書懷寄崔尚書通義里寓居即事上陽宫詞西塞寓居二首題福州天王閣憶薦福寺南宫塔院小屋四壁題琉璃院寺中偶題山寺寓居寄僧偶題遊靈隱天竺二寺醉題邑宰南塘屋壁題泗州塔東歸題屋壁寓題偶題寓題述懷將入城靈口道中作新屋新葺苑堂二首苑亭客㕔詠寫真放榜日曲江宴日呈諸同年渤海賔貢髙元固先輩閩中相訪卷第九七言律詩五十二首偶吟贈表弟黃校書輅輦下贈屯田何貟外贈月君贈垂光同年贈楊著作贈黃校書先輩璞間居尚書榮拜恩命二首府主僕射王搏主日獻內翰楊侍郎送劉常侍送盧拾遺歸華山春末送陳先輩之清源上盧三拾遺以言見黜送王校書往清源嶽州端午日送人逰郴連賀清源太保王延郴二首病中春日即事寄主人尚書二首寄華山司空侍郎三首寄盧端公同年寄天台陳希畋寄兩浙羅書記邑宰相訪翌日有寄白酒兩瓶送崔侍御依韵酬常循州謝主人惠緑酒白魚蜀魏吳兩晋宋二首陳讀史漢宫新寵開元即事李翰林聞長安庚午歲事公子行依韵贈嚴司直傷前翰林楊尤丞日月無情新月和尚書詠烟宫鶯雙鷺鷓鴣卷第十七言律詩五十二首鷹蝴蝶二首剪刀𥿄被𥿄帳貢餘祕色茶盞蜀鞭詠簾詠燈詠扇詠筆二首詠錢尚書筵中詠紅手帕尚書新造花箋釣車栁愁草螢水苔曉別夜雨萍恨鴻鶴鵲霜風帆夢東西南北雲燕蟬露霞蒲泉煙間忙淚月唐祕書省正字先輩徐公釣磯文集目録終
