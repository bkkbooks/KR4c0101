front:
  text: 唐秘書省正字先輩徐公釣磯文集卷第十
  hash: sha256:43cebff8a53c74ede2089f72ac737f8b145dd9ff9ca0d835786e44f9dc05cac8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0101_SBCK_010-1a}
body:
  text: 徐夤昭夢著詩七言律詩五十二首鷹害物傷生性豈馴且冝籠罩待知人惟擒燕雀㗖腥血却笑鸞凰啄翠筠放兎穴多非爾識鳴鳩脰短罰君身豪門不讀詩書者走馬平原放翫頻蝴蝶二首縹緲青蟲脱殻微不堪煙重雨霏霏一枝穠艶留教住幾處春風借與飛防患毎憂雞雀口憐香偏遶綺羅衣無情豈解關魂夢莫信莊周說是非又拂緑穿紅麗日長一生事住春光最嫌神女來行雨愛伴西施去採香風定只應攅蕋粉夜寒長是宿花房鳴蝉性分殊違濶空解三秋噪夕陽剪刀寳持多用繡爲􅌩䨇日交加兩片霜金匣掠平花翡翠緑窓裁破錦鴛鴦𥘉連理枝猶短誤綰同心帶不長欲製緼袍先把看非紈綺愧銛鋩𥿄被文采鴛鴦罷合歡細柔輕綴好魚牋一床明月蓋歸夢數尺白雲籠冷眠披對勁風温勝酒擁聽寒雨暖於綿赤眉豪客見皆笑却問儒生直幾錢𥿄帳幾笑文園四壁空避寒深入剡藤中誤懸謝守澄江練自宿嫦娥白兎宫叠玉山開洞壑半巖春霧結房櫳針羅截錦饒君侈爭及蒙茸暖避風貢餘秘色茶盞捩翠融青瑞色新陶成先得貢吾君巧剜明月染春水輕旋薄氷盛緑雲古鏡破苔當席上嫩荷涵露别江濆中山竹葉𥘉發多病那堪中十分蜀鞭笻竹巖邊剔翠苔錦江波泠洗瓊瑰纍纍節展蒼龍骨寸寸珠聮巨蚌胎須向廣塲驅組駿莫從閑處撻駑駘寧同晋帝環營日抛賺中途後騎來詠簾素節輕盈珠影勻何人巧思閒成文閑垂别殿風應度半掩行宫麝欲熏繡户逺籠寒熖重玉樓髙掛曙光分無情幾恨黃昏月纔到如鈎便墜雲詠燈分影由來共不同緑窓孤舘兩何窮熒煌短熖長疑暗零落殘花旋委空幾處隔簾愁夜雨誰家當户怯秋風莫言明滅無多事曽比人生一世中詠扇爲發凉颷滿玉堂每親襟袖便難忘霜濃雪暗知何在道契時來忽自揚曾伴一樽臨小檻幾遮殘日過囬廊漢宫如有秋風起誰信班姬淚數行詠筆二首秦代將軍欲建功截龍搜兎助英雄用多誰念毛皆㧞抛却更嫌心不中史氏只應歸道直江淹何獨偶靈通班超投管不成事投擲翻從萬里戎又君子三歸擅一名秋毫無細非輕軍書羽檄教誰録帝命王言待我成勢徤豈饒淝水陣鋒銛還學歴山耕毛乾氏有何人潤盡把燒焚恨始平詠錢多蓄多藏豈足論有誰還議濟王孫能於禍處翻爲福解向讐家買得恩幾怪鄧通難免餓須知夷甫不曽言朝爭暮競歸何處盡入權門與倖門尚書筵中詠紅手帕鶴綾三尺曉霞濃送與東家二八容羅帶綉裙輕好繋藕絲紅縷細𥘉縫别來拭淚遮桃臉行去包香墜粉胸無事把將纏皓腕爲君池上折芙蓉尚書新造花牋濃染紅桃二月花只冝神筆縱龍蛇淺澄秋水看雲母碎擘輕苔閒粉霞冩賦好追陳后寵題詩堪送竇滔家使君即入金銮殿夜直無非草白麻釣車荻湾漁客巧粧成硾鑄銀星一點輕抛過碧江鸂鶒岸軋殘金井轆轤聲軸磨騂角氷光滑輪卷春絲水面平把向嚴灘㝷轍跡漁臺基在輾難傾栁莫漠金條引線微年年先翠報春歸解籠飛靄延芳景不逐亂花飄夕暉啼鳥噪蝉堪悵望舞烟揺水自因依五株名顯陶家後見說辭榮種者稀愁夜長偏覺漏聲遲往往隨歌慘翠眉黃葉落催砧杵日子規啼破夢魂時明妃去泣千行淚蔡琰歸梳兩鬂絲四皓入山招不得無家歸客最堪欺草廢苑荒堦伴緑苔恩踈長信恨難開姑蘇麋鹿食思食楚澤王孫來不來色嫩似将藍汁染葉齊如把剪刀裁燕昭殁後多卿士千載流芳郭隗䑓螢月墜西樓夜影空透簾穿幕達房櫳流光堪在珠璣列爲火不生榆栁中一一照通黃卷字輕輕化出緑蕪叢欲知應候何時節六月𥘉迎大暑風水火性何如水性柔西來東出幾時休莫言通海能通漢雖解浮舟也覆舟湘浦暮沉堯女怨汾河秋泛漢皇愁洪波激湍歸何處二月桃花滿眼流苔印留麋鹿野禽蹤巖壁漁磯幾處逄金谷曉凝花影重章華春映栁隂濃石橋羽客遺前跡陳閤才人没舊容歸去掃除堦砌下蘚㾗殘黠一重重曉水盡銅龍滴漸微景陽鐘動夢魂飛潼關雞唱促歸騎金殿燭殘求御衣窓下寒機猶自織梁閒棲燕欲䨇飛羲和暗聳扶桑轡借與寰瀛看早暉别酒盡欲終問後期泛萍浮梗不勝悲東門走馬夜歸處南浦片帆飛去時賦罷江淹吟更苦詩成蘇武思何遲可憐范陸分襟後空折梅花寄所思夜日墜虞淵燭影開沉沉烟霧壓浮埃剡川雪滿子猷去漢殿月生王母來簷掛蛛絲應漸織風吹螢火不成灰愁人莫問何時旦自有鐘鳴漏滴催雨引電隨龍宻又輕酒杯閑噀得嘉名千山草木如雲暗陸地波瀾接海平灑竹幾添春睡重滴簷偏遣夜愁生陰妖冷孽成何怪敢蔽髙天日月明萍爲實隨流瑞色新泛風縈草護遊麟宻行碧水澄涵月澁滯輕橈去採蘋比物何名腰下劔無根堪並鏡中身平湖春渚知何限撥破閑投獨蠒綸恨事與時違不自由如燒如刺寸心頭烏江項籍忍歸去雁塞李陵長繋留燕國飛霜將破夏漢宫紈扇豈禁秋須知入骨難銷處莫比人閒取次愁鴻行如兄弟影連空春去秋來燕不同紫塞別當秋露白碧山飛入暮霞紅宣王德羙周詩内蘇武書傳漢苑中况解􅔷蘆避弓箭無聲歸透雁聞風鶴閬苑瑶臺歳月長一歸華表好增傷新聲乍警𥘉零露折羽閑飛幾片霜要伴神仙歸碧落豈隨龜雁住方塘三山頂上無人處瓊樹堪巢不死郷鵲神化難源瑞即開雕錂毛羽出浮埃香閨報喜行人至碧漢填河織女囬明月解隨烏繞樹青銅寧愧雀爲臺瓊枝翠葉庭前植從待翩翩去又來霜應節誰窮造化端菊黃豺祭問應難紅窓透出鴛衾冷白草飛時雁塞寒露結芝蘭瓊屑厚日乾葵藿粉㾗殘世間無此催摇落松竹何人肯更看風城上寒來思莫窮土􅌩蘋末兩難同飄成逺浪江湖際吹起暮塵京洛中飛雪蕭條殘臘節落花狼籍古行宫春能和煦秋摇落生殺還同造化功帆豈勞孤棹送行舟輕過天涯勢未休斷岸曉看殘月掛逺湾寒背夕陽収川平直可追飛箭風徤還能泝急流幸遇濟川恩不淺北溟東海更何愁夢月落燈前閉北堂神魂交入杳冥郷文通毫管醒來異武帝蘅蕪覺後香傅說已徴賢可輔周公不見恨何長生松十八年方應通塞人間豈合忙東紫氣夫元出故關大明光照九垓閒鰲山海上秦娥去鱸鱠江邊齊椽還青帝郊埛平似砥主人階級峻如山蟠桃樹在烟濤水解凍風髙未得攀西宻雲郊外已囬秋日下崦嵫景懶収秦帝城髙堅似鐡李斯書上曲如鈎寧惟東嶽凌天秀更有長庚瞰曙流見說山傍偏出將犬戎降盡復何愁南罩罩嘉魚憶北方送君前浦恨難量火山逺照蒼梧郡銅柱髙標碧海郷陸賈幾時來越島三閭何日濯滄浪鍾儀冠弊歸心阻蝴蝶飛園萬草芳北雪滿胡天日影微李君降虜失良時窮溟駕浪鵾鵬化極海寄書鴻雁遲來猶未啓殘兵奔去杳難追可憐燕谷花開晚鄒律如何爲一吹雲漠漠沉沉向夕暉蒼梧巫峽兩相依天心白日空休蔽海上故山應自歸似蓋好臨千乗載如羅堪剪六銖衣爲霖須救蒼生旱莫向西郊作雨稀燕從待􅔷泥濺客衣百禽靈性比他稀何嫌何恨秋須去無約無期春自歸鵰鶚不容應不怪棟梁相庇願相依呉王宫女嬌相襲合整䨇毛預奮飛蟬寒鳴寧與衆蟲同翼鬂緌冠豈道窮殻蛻已従今日化聲愁何似去年中朝催籬菊花開露暮促庭槐葉墜風從此最能驚賦客計居何處轉飛蓬露鶴鳴先驚雁來天洗竹霑花處處鮮散綵幾當蟬飲際凝光冝對蚌胎前朝垂苑草烟猶重夜滴宫槐月正圓怵惕與霜同降日蘋蘩思薦獨悽然霞天際何人濯錦歸偏冝殘照與晨暉流爲洞府千年酒化作靈山幾襲衣野燒𦦨連殊赫奕愁雲隂隔乍依稀勞生願學長生術飡盡紅桃上漢飛蒲濯秀盤根在碧流紫茵含露向晴抽編爲細履隨君歩織作輕帆送客愁踈葉稍違投餌釣宻叢還碍採蓮舟鴛鴦鸂鶒多情甚日日䨇䨇遶遊泉非鑿非䟽出洞門源深流嶮合還分髙成瀑布潄逋客清入御溝朝聖君迸滴幾山穿破石迅飛層嶠噴開雲舊齋一帶連松竹明月窓前枕上聞烟燎野焚林見所從惹空橫水展形容能滋甘雨隨車潤不並行雲逐夢蹤晴鳥廽籠嘉樹薄春亭嬌幕好花濃有時片片風吹去海碧山青過幾重閑不管人閒是與非白雲流水自相依一瓢掛樹傲時代五栁種門吟落暉江上翠娥遺佩去岸邊紅袖採蓮歸客星辭得漢光武却坐東江舊蘚磯忙䨇競龍舟疾似風一星毬子兩同平呉破蜀三裏㓕楚圖秦百戰中春近杜鵑啼不㫁寒催歸雁去何窮兵還失路旌旗亂驚起紅塵似轉􅏃涙發事牽情不自由偶然惆悵即難収已聞抱玉沾衣濕見說迷途滿目流滴盡綺筵紅燭暗墜殘粧閣曉花羞世閒何處偏留得兩點分明湘水頭月碧落誰分造化權結霜凝雪作嬋娟寒蟬若不開三冗狡兎何從上九天莫見圑圓明處逺須看彎曲鍳時偏郄詵樹老堯蓂換惆悵今年似去年釣磯文集卷第十終
